<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finance Tracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #F2F2F7; --bg-card: #FFFFFF; --text-main: #1C1C1E; --text-sub: #8E8E93;
            --border-card: rgba(0, 0, 0, 0.05); --divider: rgba(0, 0, 0, 0.08); --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --input-bg: #F2F2F7; --modal-bg: #FFFFFF; --refresh-bg: #FFFFFF;
            --btn-close-bg: #E5E5EA; --btn-close-text: #8E8E93;
            --system-lime: #A3E635;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #000000; --bg-card: #1C1C1E; --text-main: #FFFFFF; --text-sub: #9CA3AF;
                --border-card: rgba(255, 255, 255, 0.05); --divider: rgba(255, 255, 255, 0.12);
                --card-shadow: none; --input-bg: #2C2C2E; --modal-bg: #1C1C1E; --refresh-bg: #1C1C1E;
                --btn-close-bg: #2C2C2E; --btn-close-text: #9CA3AF;
            }
        }
        
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', 'Noto Sans Thai', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; padding-top: calc(env(safe-area-inset-top, 20px) + 20px); padding-left: 20px; padding-right: 20px; padding-bottom: 120px; transition: background-color 0.3s ease; }
        body.modal-open { overflow: hidden; position: fixed; width: 100%; }

        .ios-card { background-color: var(--bg-card); border-radius: 28px; border: 1px solid var(--border-card); box-shadow: var(--card-shadow); transition: transform 0.2s; }
        
        /* Modal System */
        .modal-overlay { transition: opacity 0.3s ease; position: fixed; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; pointer-events: none; display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
        @media (prefers-color-scheme: dark) { .modal-overlay { background: rgba(0,0,0,0.85); } }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        #viewAllModal { z-index: 200; }
        #profileModal, #entryModal { z-index: 300; }
        #discardModal { z-index: 400; }

        .modal-content { transition: transform 0.3s ease-out; width: 100%; background: var(--modal-bg); border-radius: 32px 32px 0 0; transform: translateY(100%); padding: 24px; border-top: 1px solid var(--border-card); max-height: 92vh; overflow-y: auto; }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .bg-system { background-color: var(--system-lime) !important; color: #000 !important; }
        .text-system { color: var(--system-lime) !important; }
        .text-income { color: #22C55E; } .bg-income { background-color: #22C55E; } .bg-income-op { background-color: rgba(34, 197, 94, 0.12); }
        .text-expense { color: #EF4444; } .bg-expense { background-color: #EF4444; } .bg-expense-op { background-color: rgba(239, 68, 68, 0.12); }
        .text-deduction { color: #F59E0B; } .bg-deduction { background-color: #F59E0B; } .bg-deduction-op { background-color: rgba(245, 158, 11, 0.12); }

        .spinning { animation: spin 1.2s linear infinite; color: var(--system-lime) !important; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .filter-active { border: 2px solid var(--system-lime) !important; background-color: rgba(163, 230, 53, 0.05) !important; }
        .card-divider { position: relative; }
        .card-divider::before { content: ""; position: absolute; top: 0; left: 20px; right: 20px; height: 1px; background-color: var(--divider); }
        
        .btn-close { width: 36px; height: 36px; background-color: var(--btn-close-bg); color: var(--btn-close-text); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Swipe System */
        .swipe-item { position: relative; overflow: hidden; border-radius: 22px; margin-bottom: 8px; background: transparent; }
        .swipe-actions { position: absolute; top: 0; right: 0; height: 100%; display: flex; z-index: 1; }
        .swipe-content { position: relative; background: var(--bg-card); z-index: 2; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); width: 100%; border-radius: 22px; border: 1px solid var(--border-card); }
        .action-btn { width: 65px; height: 100%; display: flex; align-items: center; justify-content: center; color: white; }
        .btn-edit { background: #3B82F6; } .btn-delete { background: #EF4444; }

        input, select { background-color: var(--input-bg) !important; color: var(--text-main) !important; border-radius: 18px; outline: none; -webkit-appearance: none; appearance: none; }
        #monthPicker { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0 !important; cursor: pointer; z-index: 10; }
        .fab-btn { position: fixed; bottom: calc(env(safe-area-inset-bottom, 20px) + 24px); right: 24px; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2); z-index: 50; }
        .loader-white { border: 2px solid rgba(0,0,0,0.1); border-top: 2px solid #000; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
    </style>
</head>
<body>

    <!-- Main Button -->
    <button onclick="openAddEntryModal()" class="fab-btn bg-system"><i class="fa-solid fa-plus text-xl"></i></button>

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-8 px-1">
        <div onclick="openProfileModal()" class="active:opacity-50 cursor-pointer">
            <p id="greetingText" style="color: var(--text-sub)" class="text-[10px] uppercase tracking-[0.2em] font-bold">HELLO</p>
            <div class="flex items-center gap-2">
                <h1 id="userNameDisplay" class="text-2xl font-black tracking-tight" style="color: var(--text-main)">User</h1>
                <i class="fa-solid fa-chevron-right text-gray-400 text-xs mt-1"></i>
            </div>
        </div>
        <button onclick="fetchData(true)" style="background-color: var(--refresh-bg)" class="w-10 h-10 rounded-full flex items-center justify-center border border-white/5 active:scale-90 transition-transform">
            <i id="refreshIcon" class="fa-solid fa-rotate-right text-gray-400 text-sm"></i>
        </button>
    </div>

    <!-- MONTH NAV -->
    <div class="flex justify-center items-center gap-6 mb-8">
        <button onclick="changeMonth(-1)" class="p-2 text-gray-400 active:text-lime-500"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="relative flex items-center gap-2 px-2 py-1">
            <span id="displayMonth" class="text-lg font-bold min-w-[130px] text-center" style="color: var(--text-main)">...</span>
            <input type="month" id="monthPicker" onchange="selectMonth(this.value)">
        </div>
        <button onclick="changeMonth(1)" class="p-2 text-gray-400 active:text-lime-500"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <!-- BALANCE CARD -->
    <div id="balanceCard" class="ios-card overflow-hidden mb-8">
        <div class="text-center py-10">
            <p style="color: var(--text-sub)" class="text-[10px] tracking-widest mb-2 uppercase font-bold">Available Balance</p>
            <h2 id="totalBalance" class="text-5xl font-black tracking-tighter" style="color: var(--text-main)">฿0.00</h2>
        </div>
        <div class="px-2 pb-2">
            <div id="cardIncome" onclick="setFilter('Income')" class="flex justify-between items-center p-4 rounded-2xl transition-all cursor-pointer border border-transparent">
                <div class="flex items-center gap-3"><div class="w-11 h-11 bg-income-op rounded-full flex items-center justify-center text-income"><i class="fa-solid fa-arrow-up text-sm"></i></div><div class="text-left"><p class="font-bold text-[15px]" style="color: var(--text-main)">Income</p><p id="countIncome" style="color: var(--text-sub)" class="text-[9px] uppercase font-bold">0 items</p></div></div><span id="valIncome" class="text-income font-black text-lg">฿0.00</span>
            </div>
            <div id="cardExpense" onclick="setFilter('Expense')" class="card-divider flex justify-between items-center p-4 rounded-2xl transition-all cursor-pointer border border-transparent">
                <div class="flex items-center gap-3"><div class="w-11 h-11 bg-expense-op rounded-full flex items-center justify-center text-red-500"><i class="fa-solid fa-arrow-down text-sm"></i></div><div class="text-left"><p class="font-bold text-[15px]" style="color: var(--text-main)">Expense</p><p id="countExpense" style="color: var(--text-sub)" class="text-[9px] uppercase font-bold">0 items</p></div></div><span id="valExpense" class="text-red-500 font-black text-lg">฿0.00</span>
            </div>
            <div id="cardDeduction" onclick="setFilter('Deduction')" class="card-divider flex justify-between items-center p-4 rounded-2xl transition-all cursor-pointer border border-transparent">
                <div class="flex items-center gap-3"><div class="w-11 h-11 bg-deduction-op rounded-full flex items-center justify-center text-orange-400"><i class="fa-solid fa-minus text-xs"></i></div><div class="text-left"><p class="font-bold text-[15px]" style="color: var(--text-main)">Deduction</p><p id="countDeduction" style="color: var(--text-sub)" class="text-[9px] uppercase font-bold">0 items</p></div></div><span id="valDeduction" class="text-orange-400 font-black text-lg">฿0.00</span>
            </div>
        </div>
    </div>

    <!-- ENTRIES CARD (1-2-1 LOGIC) -->
    <div class="ios-card p-6">
        <div class="flex justify-between items-center mb-6 px-1">
            <h3 id="entriesTitle" style="color: var(--text-sub)" class="font-black tracking-widest text-[11px] uppercase">Entries</h3>
            <button onclick="openViewAll()" class="text-system text-[11px] font-black uppercase tracking-widest">View All</button>
        </div>
        <div id="entryList" class="space-y-6"></div>
    </div>

    <!-- MODAL: View All (With Swipe Actions) -->
    <div id="viewAllModal" class="modal-overlay"><div class="modal-content h-[90vh] flex flex-col">
        <div class="flex justify-between items-center mb-6 px-1"><h3 class="text-xl font-black">ALL ENTRIES</h3><button onclick="toggleModal('viewAllModal', false)" class="btn-close"><i class="fa-solid fa-xmark"></i></button></div>
        <div id="viewAllList" class="flex-1 overflow-y-auto space-y-2 pb-10"></div>
        <div class="pt-4 pb-8"><button onclick="openAddEntryModal()" class="w-full py-4 bg-system rounded-2xl font-black uppercase text-xs shadow-xl shadow-lime-500/20">+ Add Entry</button></div>
    </div></div>

    <!-- MODAL: New Entry -->
    <div id="entryModal" class="modal-overlay"><div class="modal-content pb-10">
        <div class="flex justify-between items-center mb-8 px-1"><h3 class="text-xl font-black text-system">New Entry</h3><button onclick="handleCloseEntryModal()" class="btn-close"><i class="fa-solid fa-xmark"></i></button></div>
        <div class="space-y-6 text-left">
            <div><label class="text-[10px] font-black text-gray-500 uppercase ml-1">Type</label><select id="inputType" onchange="markAsDirty(); populateCategories()" class="w-full h-14 px-5 rounded-2xl font-bold mt-1"></select></div>
            <div><label class="text-[10px] font-black text-gray-500 uppercase ml-1">Category</label><select id="inputCategory" onchange="markAsDirty()" class="w-full h-14 px-5 rounded-2xl font-bold mt-1"></select></div>
            <div><label class="text-[10px] font-black text-gray-500 uppercase ml-1">Amount (฿)</label><input type="number" id="inputAmount" oninput="markAsDirty()" placeholder="0.00" class="w-full h-14 px-5 rounded-2xl font-black text-2xl mt-1"></div>
            <button id="saveBtn" onclick="saveEntry()" class="w-full h-14 bg-system rounded-2xl font-black uppercase tracking-widest mt-4">SAVE</button>
        </div>
    </div></div>

    <!-- MODAL: Profile -->
    <div id="profileModal" class="modal-overlay"><div class="modal-content pb-10">
        <div class="flex justify-between items-center mb-8 px-1"><h3 class="text-xl font-black text-system">Edit Profile</h3><button onclick="toggleModal('profileModal', false)" class="btn-close"><i class="fa-solid fa-xmark"></i></button></div>
        <input type="text" id="inputUserName" maxlength="20" class="w-full h-14 px-5 font-bold text-xl rounded-2xl bg-gray-100 dark:bg-gray-800 mb-6">
        <button onclick="saveProfile()" class="w-full h-14 bg-system rounded-2xl font-black uppercase">SAVE</button>
    </div></div>

    <!-- MODAL: Discard Alert -->
    <div id="discardModal" class="modal-overlay flex items-center justify-center p-8"><div class="ios-card w-full max-w-[320px] p-8 text-center">
        <h3 class="text-xl font-bold">Discard changes?</h3><p class="mt-2 text-sm text-gray-500">Your information will be lost.</p>
        <div class="mt-8 space-y-3"><button onclick="toggleModal('discardModal', false)" class="w-full h-14 bg-gray-100 dark:bg-gray-800 rounded-2xl font-bold">Keep Editing</button><button onclick="confirmDiscard()" class="w-full h-14 bg-red-500 text-white rounded-2xl font-bold">Discard</button></div>
    </div></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTJv54p_2fZa31Lurvvf1HdSPSO48BdxW2Biov3Bp9ZTmbaSyuNYiDv-5n9lUtFJscLg/exec";
        const categoryIcons = { "เงินเดือน": "fa-wallet", "apple music": "fa-music", "ยอดขายทะลุเป้าหมาย": "fa-arrow-trend-up", "แชร์": "fa-users", "อื่นๆ": "fa-tag", "3BB": "fa-wifi", "แม่": "fa-house-user", "ศรีสวัสดิ์": "fa-motorcycle", "สยามชัย": "fa-plug", "AIS": "fa-signal", "SEasy": "fa-money-bill", "Spay later": "fa-basket-shopping", "Tpay later": "fa-cart-shopping", "มาสาย": "fa-business-time", "ลืมรูดบัตร": "fa-id-card", "ออนไลน์ออกก่อนเกิน": "fa-arrow-right-from-bracket", "ออนไลน์ออกก่อน": "fa-house", "ไม่สแกนนิ้ว": "fa-fingerprint", "ผิดกฎระเบียบ": "fa-circle-exclamation", "ลาป่วย": "fa-briefcase-medical", "ผ่อนสินค้า": "fa-mobile", "ออมทรัพย์": "fa-piggy-bank" };
        const masterCategories = { Income: ["เงินเดือน", "apple music", "ยอดขายทะลุเป้าหมาย", "แชร์", "อื่นๆ"], Expense: ["3BB", "แชร์", "แม่", "ศรีสวัสดิ์", "สยามชัย", "AIS", "SEasy", "Spay later", "Tpay later"], Deduction: ["มาสาย", "ลืมรูดบัตร", "ออนไลน์ออกก่อนเกิน", "ออนไลน์ออกก่อน", "ไม่สแกนนิ้ว", "ผิดกฎระเบียบ", "ลาป่วย", "ผ่อนสินค้า", "ออมทรัพย์"] };

        let entries = [], currentViewDate = new Date(), currentFilter = null, isModified = false, editTargetID = null;

        function formatMoney(n) { return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
        
        function toggleModal(id, show) { 
            const el = document.getElementById(id);
            if(show) { el.classList.add('active'); document.body.classList.add('modal-open'); }
            else { el.classList.remove('active'); const modals = document.querySelectorAll('.modal-overlay.active'); if(modals.length === 0) document.body.classList.remove('modal-open'); }
        }

        async function fetchData(isManual = false) {
            const icon = document.getElementById('refreshIcon'); if(icon) icon.classList.add('spinning');
            try {
                const res = await fetch(SCRIPT_URL + (isManual ? `?v=${Date.now()}` : ""));
                entries = await res.json();
                localStorage.setItem('finance_cache', JSON.stringify(entries));
                renderData();
            } catch (e) { console.error("Fetch failed"); }
            finally { if(icon) icon.classList.remove('spinning'); }
        }

        function renderData() {
            const list = document.getElementById('entryList'), m = currentViewDate.getMonth(), y = currentViewDate.getFullYear();
            const mData = entries.filter(i => { const d = new Date(i.date); return d.getMonth() === m && d.getFullYear() === y; });
            
            let totals = { Income: 0, Expense: 0, Deduction: 0, cI: 0, cE: 0, cD: 0 };
            mData.forEach(i => { totals[i.type] += Number(i.amount); totals[`c${i.type.charAt(0)}`]++; });

            document.getElementById('totalBalance').innerText = `฿${formatMoney(totals.Income - totals.Expense)}`;
            document.getElementById('valIncome').innerText = `฿${formatMoney(totals.Income)}`;
            document.getElementById('valExpense').innerText = `฿${formatMoney(totals.Expense)}`;
            document.getElementById('valDeduction').innerText = `฿${formatMoney(totals.Deduction)}`;
            document.getElementById('countIncome').innerText = `${totals.cI} items`;
            document.getElementById('countExpense').innerText = `${totals.cE} items`;
            document.getElementById('countDeduction').innerText = `${totals.cD} items`;

            list.innerHTML = "";
            let displayList = [];
            if (!currentFilter) {
                const fixed = ["แม่", "ศรีสวัสดิ์", "แชร์", "สยามชัย", "3BB"];
                const incs = mData.filter(i => i.type === 'Income').sort((a,b) => b.amount - a.amount).slice(0, 1);
                const exps = mData.filter(i => i.type === 'Expense' && !fixed.includes(i.category)).sort((a,b) => b.amount - a.amount).slice(0, 2);
                const deds = mData.filter(i => i.type === 'Deduction' && i.category !== "ออมทรัพย์").sort((a,b) => b.amount - a.amount).slice(0, 1);
                displayList = [...incs, ...exps, ...deds];
            } else {
                displayList = mData.filter(i => i.type === currentFilter).sort((a,b) => b.amount - a.amount).slice(0, 5);
            }
            if(!displayList.length) list.innerHTML = `<p class="text-center py-10 opacity-30 text-sm">No entries yet</p>`;
            else displayList.forEach(i => list.innerHTML += createBaseHTML(i));
        }

        function createBaseHTML(i) {
            const icon = categoryIcons[i.category] || 'fa-tag';
            const color = i.type === 'Income' ? 'text-income' : i.type === 'Expense' ? 'text-expense' : 'text-deduction';
            const bg = i.type === 'Income' ? 'bg-income' : i.type === 'Expense' ? 'bg-expense' : 'bg-deduction';
            return `<div class="flex justify-between items-center"><div class="flex items-center gap-4"><div class="w-11 h-11 ${bg} rounded-[18px] flex items-center justify-center text-white"><i class="fa-solid ${icon} text-lg"></i></div><div><p class="text-[15px] font-bold">${i.category}</p><p class="text-[9px] opacity-40 uppercase font-black">${i.type}</p></div></div><span class="font-black text-[16px] ${color}">฿${formatMoney(i.amount)}</span></div>`;
        }

        // --- SWIPE LOGIC FOR VIEW ALL ---
        function createSwipeHTML(i) {
            const id = Date.parse(i.date);
            return `
                <div class="swipe-item" data-id="${id}">
                    <div class="swipe-actions">
                        <div class="action-btn btn-edit" onclick="handleEdit(${id})"><i class="fa-solid fa-pen-to-square"></i></div>
                        <div class="action-btn btn-delete" onclick="handleDelete(${id})"><i class="fa-solid fa-trash"></i></div>
                    </div>
                    <div class="swipe-content" ontouchstart="ts(event)" ontouchmove="tm(event)" ontouchend="te(event)">
                        ${createBaseHTML(i)}
                    </div>
                </div>`;
        }

        let startX = 0, currentSwipeEl = null;
        function ts(e) { if(currentSwipeEl) currentSwipeEl.style.transform = 'translateX(0)'; currentSwipeEl = e.currentTarget; startX = e.touches[0].clientX; }
        function tm(e) {
            let diff = startX - e.touches[0].clientX;
            if (diff > 10 && diff < 150) { currentSwipeEl.style.transform = `translateX(-${diff}px)`; if(e.cancelable) e.preventDefault(); }
        }
        function te(e) {
            let diff = startX - e.changedTouches[0].clientX;
            if (diff > 70) currentSwipeEl.style.transform = 'translateX(-130px)';
            else { currentSwipeEl.style.transform = 'translateX(0)'; currentSwipeEl = null; }
        }

        // --- CORE FUNCTIONS ---
        function setFilter(t) {
            currentFilter = (currentFilter === t) ? null : t;
            ['Income','Expense','Deduction'].forEach(type => {
                const el = document.getElementById(`card${type}`);
                if(el) el.classList.toggle('filter-active', currentFilter===type);
            });
            renderData();
        }

        function openAddEntryModal() {
            editTargetID = null;
            document.getElementById('saveBtn').innerText = "SAVE";
            document.getElementById('inputType').innerHTML = `<option value="Income">Income</option><option value="Expense">Expense</option><option value="Deduction">Deduction</option>`;
            document.getElementById('inputType').value = currentFilter || 'Income';
            document.getElementById('inputAmount').value = "";
            isModified = false;
            populateCategories();
            toggleModal('entryModal', true);
        }

        function handleEdit(id) {
            const item = entries.find(e => Date.parse(e.date) === id);
            if(item) {
                editTargetID = id;
                document.getElementById('saveBtn').innerText = "UPDATE";
                document.getElementById('inputType').value = item.type;
                populateCategories();
                document.getElementById('inputCategory').value = item.category;
                document.getElementById('inputAmount').value = item.amount;
                toggleModal('viewAllModal', false);
                toggleModal('entryModal', true);
            }
        }

        async function handleDelete(id) {
            if(!confirm("Delete this entry?")) return;
            const idx = entries.findIndex(e => Date.parse(e.date) === id);
            if(idx > -1) {
                entries.splice(idx, 1);
                renderData(); openViewAll();
                fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', id: id }) });
            }
        }

        async function saveEntry() {
            const btn = document.getElementById('saveBtn'), amt = document.getElementById('inputAmount').value;
            if(!amt || amt <= 0) return alert("Enter amount");
            btn.disabled = true; btn.innerHTML = `<span class="loader-white"></span> SAVING...`;
            const data = { action: editTargetID ? 'edit' : 'add', id: editTargetID, date: new Date().toISOString(), type: document.getElementById('inputType').value, category: document.getElementById('inputCategory').value, amount: amt };
            try { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }); toggleModal('entryModal', false); fetchData(true); } catch (e) { alert("Error"); }
            finally { btn.disabled = false; btn.innerText = "SAVE"; }
        }

        function openViewAll() {
            const list = document.getElementById('viewAllList'), m = currentViewDate.getMonth(), y = currentViewDate.getFullYear();
            const mData = entries.filter(i => { const d = new Date(i.date); return d.getMonth() === m && d.getFullYear() === y; });
            list.innerHTML = "";
            mData.sort((a,b) => b.amount - a.amount).forEach(i => list.innerHTML += createSwipeHTML(i));
            toggleModal('viewAllModal', true);
        }

        function updateGreeting() { const h = new Date().getHours(); document.getElementById('greetingText').innerText = h < 12 ? "GOOD MORNING" : h < 17 ? "GOOD AFTERNOON" : "GOOD EVENING"; }
        function loadUserProfile() { const n = localStorage.getItem('userName') || 'User'; document.getElementById('userNameDisplay').innerText = n; document.getElementById('inputUserName').value = n; }
        function saveProfile() { localStorage.setItem('userName', document.getElementById('inputUserName').value); loadUserProfile(); toggleModal('profileModal', false); }
        function changeMonth(s) { currentViewDate.setMonth(currentViewDate.getMonth() + s); updateMonthDisplay(); renderData(); }
        function selectMonth(v) { if(v) { currentViewDate = new Date(v + "-01"); updateMonthDisplay(); renderData(); fetchData(true); } }
        function updateMonthDisplay() { document.getElementById('displayMonth').innerText = currentViewDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }); }
        function populateCategories() { const t = document.getElementById('inputType').value, s = document.getElementById('inputCategory'); s.innerHTML = ""; masterCategories[t].forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`); }
        function openProfileModal() { toggleModal('profileModal', true); }
        function markAsDirty() { isModified = true; }
        function handleCloseEntryModal() { if(isModified && document.getElementById('inputAmount').value) toggleModal('discardModal', true); else toggleModal('entryModal', false); }
        function confirmDiscard() { toggleModal('discardModal', false); toggleModal('entryModal', false); isModified = false; }

        window.onload = () => { updateGreeting(); loadUserProfile(); updateMonthDisplay(); fetchData(); };
    </script>
</body>
</html>
