<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Finance App Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --lime: #d9f99d; --bg: #0d1117; }
        body { 
            background-color: var(--bg); color: white; font-family: -apple-system, sans-serif;
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            overflow-x: hidden;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Fixed Navigation like Apple Music */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            height: calc(80px + env(safe-area-inset-bottom)); 
            background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 1000; display: flex; justify-content: space-around; 
            align-items: center; padding-bottom: env(safe-area-inset-bottom);
        }

        .modal-full { 
            position: fixed; inset: 0; background: var(--bg); 
            z-index: 2000; display: none; flex-direction: column;
            padding: env(safe-area-inset-top) 25px env(safe-area-inset-bottom);
        }
        .modal-full.active { display: flex; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .avatar-item { width: 100%; aspect-ratio: 1/1; rounded: 50%; border: 3px solid transparent; overflow: hidden; cursor: pointer; }
        .avatar-item.selected { border-color: var(--lime); }
        .avatar-item img { width: 100%; height: 100%; object-fit: cover; }

        .filter-box { background: white; color: black; border-radius: 18px; padding: 12px 20px; flex: 1; text-align: center; font-weight: 600; font-size: 18px; }
    </style>
</head>
<body class="px-6">

    <!-- Header & Profile -->
    <div class="flex justify-between items-center mt-6 mb-8">
        <div class="flex items-center gap-4" onclick="openProfileEdit()">
            <img id="mainProfileImg" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix" class="w-14 h-14 rounded-full border-2 border-lime-400 object-cover">
            <div>
                <h2 class="text-xl font-bold flex items-center gap-2">
                    Hi, <span id="userNameDisplay">User</span>
                    <i class="fa-solid fa-chevron-right text-[10px] opacity-40"></i>
                </h2>
            </div>
        </div>
        <div class="w-11 h-11 glass rounded-full flex items-center justify-center"><i class="fa-regular fa-bell"></i></div>
    </div>

    <!-- Wallet Balance -->
    <div class="mb-8">
        <p class="text-gray-400 text-sm mb-1 font-medium">ยอดเงินคงเหลือ (Wallet)</p>
        <h1 class="text-5xl font-bold tracking-tighter">฿<span id="balanceDisplay">0.00</span></h1>
    </div>

    <!-- Main Buttons -->
    <div class="grid grid-cols-3 gap-3 mb-10 text-gray-300">
        <button onclick="showTransModal('Income')" class="glass py-6 rounded-[28px] flex flex-col items-center gap-2">
            <i class="fa-solid fa-arrow-up text-lime-400 text-xl"></i><span class="text-xs">รายรับ</span>
        </button>
        <button onclick="showTransModal('Expense')" class="glass py-6 rounded-[28px] flex flex-col items-center gap-2">
            <i class="fa-solid fa-arrow-down text-red-400 text-xl"></i><span class="text-xs">รายจ่าย</span>
        </button>
        <button onclick="showTransModal('Deduction')" class="glass py-6 rounded-[28px] flex flex-col items-center gap-2">
            <i class="fa-solid fa-clock-rotate-left text-orange-400 text-xl"></i><span class="text-xs">รายการหัก</span>
        </button>
    </div>

    <!-- Month/Year Filter (Style 1464) -->
    <div class="mb-4">
        <div class="flex gap-4 items-center">
            <div class="flex-1">
                <p class="text-[10px] font-bold text-lime-500 mb-2 tracking-widest">MONTH</p>
                <select id="filterMonth" onchange="fetchData()" class="w-full bg-white text-black font-bold p-4 rounded-2xl appearance-none text-center">
                    <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                    <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                    <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                    <option value="9">October</option><option value="10">November</option><option value="11">December</option>
                </select>
            </div>
            <div class="w-32">
                <p class="text-[10px] font-bold text-lime-500 mb-2 tracking-widest">YEAR</p>
                <select id="filterYear" onchange="fetchData()" class="w-full bg-white text-black font-bold p-4 rounded-2xl appearance-none text-center">
                    <option value="2024">2024</option><option value="2025" selected>2025</option><option value="2026">2026</option>
                </select>
            </div>
        </div>
    </div>

    <!-- History -->
    <div class="mt-8">
        <h3 class="font-bold text-lg mb-4 flex justify-between">ประวัติรายการ <span id="historyRefresh" class="text-xs text-lime-400 font-normal" onclick="fetchData()">รีเฟรช</span></h3>
        <div id="historyList" class="flex flex-col gap-3"></div>
    </div>

    <!-- Profile Edit Modal -->
    <div id="profileModal" class="modal-full">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold">แก้ไขโปรไฟล์</h2>
            <button onclick="closeProfileEdit()" class="text-gray-400 text-2xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <p class="text-sm text-gray-400 mb-4">ชื่อผู้ใช้</p>
        <input type="text" id="editNameInput" class="w-full glass p-5 rounded-2xl mb-8 text-xl font-bold">
        
        <p class="text-sm text-gray-400 mb-6">เลือกรูปโปรไฟล์</p>
        <div class="avatar-grid mb-10" id="avatarGrid">
            <!-- 5 Avatars + 1 Custom -->
        </div>
        <button onclick="saveProfile()" class="w-full bg-lime-400 text-black py-5 rounded-[25px] font-bold text-lg mt-auto mb-10">บันทึกการแก้ไข</button>
        <input type="file" id="customFile" class="hidden" accept="image/*" onchange="handleCustomImg(this)">
    </div>

    <!-- Transaction Modal (Standard) -->
    <div id="transModal" class="modal-full bg-[#1a1f26]">
         <div class="flex justify-between items-center mb-8">
            <h2 id="transTitle" class="text-2xl font-bold">บันทึกรายการ</h2>
            <button onclick="closeTransModal()" class="text-gray-400 text-2xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <select id="itemSelect" class="w-full glass p-5 rounded-2xl mb-4 text-lg appearance-none" onchange="checkNewItem(this)"></select>
        <input type="number" id="itemAmount" placeholder="0.00" class="w-full glass p-6 rounded-2xl mb-8 text-4xl font-bold text-center text-lime-400">
        <button onclick="saveTransaction()" class="w-full bg-lime-400 text-black py-5 rounded-[25px] font-bold text-lg">ตกลง</button>
    </div>

    <!-- Bottom Nav Fixed -->
    <div class="bottom-nav">
        <button class="flex flex-col items-center gap-1 text-lime-400">
            <i class="fa-solid fa-house text-xl"></i><span class="text-[10px] font-bold">Home</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fa-solid fa-chart-pie text-xl"></i><span class="text-[10px]">Stat</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fa-solid fa-credit-card text-xl"></i><span class="text-[10px]">Cards</span>
        </button>
        <button onclick="openProfileEdit()" class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fa-solid fa-user text-xl"></i><span class="text-[10px]">User</span>
        </button>
    </div>

    <script>
        const API_URL = "ใส่_URL_แอปเว็บ_ตรงนี้";
        let allTransactions = [];
        let selectedAvatar = "";
        const PRESET_AVATARS = [
            "https://api.dicebear.com/7.x/adventurer/svg?seed=Felix",
            "https://api.dicebear.com/7.x/adventurer/svg?seed=Aneka",
            "https://api.dicebear.com/7.x/adventurer/svg?seed=Buddy",
            "https://api.dicebear.com/7.x/adventurer/svg?seed=Cali",
            "https://api.dicebear.com/7.x/adventurer/svg?seed=Dusty"
        ];

        // --- Profile Logic ---
        function initProfile() {
            const name = localStorage.getItem("user_name") || "Sajibur";
            const img = localStorage.getItem("user_img") || PRESET_AVATARS[0];
            document.getElementById("userNameDisplay").innerText = name;
            document.getElementById("mainProfileImg").src = img;
            document.getElementById("editNameInput").value = name;
            selectedAvatar = img;
            renderAvatarGrid();
        }

        function renderAvatarGrid() {
            const grid = document.getElementById("avatarGrid");
            const customImg = localStorage.getItem("custom_img") || "https://cdn-icons-png.flaticon.com/512/1040/1040241.png";
            let html = "";
            PRESET_AVATARS.forEach(url => {
                html += `<div class="avatar-item ${selectedAvatar === url ? 'selected' : ''}" onclick="selectAvatar('${url}')"><img src="${url}"></div>`;
            });
            html += `<div class="avatar-item ${selectedAvatar === customImg ? 'selected' : ''}" id="customSlot" onclick="triggerUpload()"><img id="customDisplay" src="${customImg}"></div>`;
            grid.innerHTML = html;
        }

        function selectAvatar(url) { selectedAvatar = url; renderAvatarGrid(); }
        function triggerUpload() { document.getElementById("customFile").click(); }
        
        function handleCustomImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem("custom_img", e.target.result);
                    selectedAvatar = e.target.result;
                    renderAvatarGrid();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveProfile() {
            localStorage.setItem("user_name", document.getElementById("editNameInput").value);
            localStorage.setItem("user_img", selectedAvatar);
            initProfile();
            closeProfileEdit();
        }

        function openProfileEdit() { document.getElementById("profileModal").classList.add("active"); }
        function closeProfileEdit() { document.getElementById("profileModal").classList.remove("active"); }

        // --- Data Logic ---
        async function fetchData() {
            try {
                document.getElementById("historyList").innerHTML = "<p class='text-center py-10 opacity-40'>กำลังโหลด...</p>";
                const response = await fetch(API_URL);
                allTransactions = await response.json();
                renderUI();
            } catch (e) { alert("โหลดข้อมูลล้มเหลว"); }
        }

        function renderUI() {
            const month = parseInt(document.getElementById("filterMonth").value);
            const year = parseInt(document.getElementById("filterYear").value);
            
            let balance = 0;
            let historyHTML = "";

            // คำนวณยอดเงินรวม (ทุกเดือน)
            allTransactions.slice(1).forEach(row => {
                const [dateStr, type, name, amount] = row;
                const amt = parseFloat(amount);
                if (type === 'Income') balance += amt;
                if (type === 'Expense') balance -= amt;

                // กรองแสดงเฉพาะเดือน/ปีที่เลือก
                const d = new Date(dateStr);
                if (d.getMonth() === month && d.getFullYear() === year) {
                    const color = type==='Income'?'text-lime-400':(type==='Expense'?'text-red-400':'text-orange-400');
                    const sym = type==='Income'?'+':(type==='Expense'?'-':'');
                    historyHTML += `
                        <div class="glass p-5 rounded-3xl flex justify-between items-center">
                            <div><p class="font-bold">${name}</p><p class="text-[10px] opacity-40">${d.toLocaleDateString('th-TH')}</p></div>
                            <p class="font-bold text-lg ${color}">${sym}${amt.toLocaleString()} ฿</p>
                        </div>`;
                }
            });

            document.getElementById("balanceDisplay").innerText = balance.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById("historyList").innerHTML = historyHTML || "<p class='text-center py-10 opacity-30 italic'>ไม่มีรายการในเดือนนี้</p>";
        }

        // --- Transaction Logic ---
        let currentType = "";
        const CATS = { Income: ["เงินเดือน", "โบนัส", "อื่นๆ"], Expense: ["แม่", "3BB", "AIS", "แชร์", "Spay later", "Tpay later", "SEasy", "อื่นๆ"], Deduction: ["มาสาย", "ลากิจ", "วินัย"] };

        function showTransModal(type) {
            currentType = type;
            const sel = document.getElementById("itemSelect");
            sel.innerHTML = CATS[type].map(c => `<option value="${c}">${c}</option>`).join('') + '<option value="NEW">+ เพิ่มรายการใหม่...</option>';
            document.getElementById("transModal").classList.add("active");
        }
        function closeTransModal() { document.getElementById("transModal").classList.remove("active"); }

        function checkNewItem(s) { 
            if(s.value === 'NEW') { 
                const n = prompt("ระบุชื่อรายการใหม่:"); 
                if(n) { const opt = document.createElement("option"); opt.value = n; opt.text = n; s.insertBefore(opt, s.firstChild); s.value = n; }
            } 
        }

        async function saveTransaction() {
            const name = document.getElementById("itemSelect").value;
            const amount = document.getElementById("itemAmount").value;
            if(!amount) return;
            closeTransModal();
            try {
                await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({type: currentType, name: name, amount: amount}) });
                document.getElementById("itemAmount").value = "";
                fetchData();
            } catch (e) { alert("Error"); }
        }

        window.onload = () => {
            initProfile();
            const now = new Date();
            document.getElementById("filterMonth").value = now.getMonth();
            document.getElementById("filterYear").value = now.getFullYear();
            fetchData();
        };
    </script>
</body>
</html>
