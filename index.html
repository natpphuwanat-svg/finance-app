<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Tracker</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #000; 
            color: white; 
            font-family: 'Inter', 'Noto Sans Thai', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; 
        }
        .ios-card { background-color: #1c1c1e; border-radius: 24px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid transparent; }
        .nav-blur { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(10px); }
        #monthPicker { position: absolute; opacity: 0; width: 100%; height: 100%; left: 0; top: 0; cursor: pointer; }
        
        .text-system { color: #A3E635; }
        .bg-system { background-color: #A3E635; }
        .text-income { color: #22C55E; }
        .bg-income { background-color: #22C55E; }
        .bg-income-op { background-color: rgba(34, 197, 94, 0.15); }
        .text-expense { color: #EF4444; }
        .bg-expense { background-color: #EF4444; }
        .bg-expense-op { background-color: rgba(239, 68, 68, 0.15); }
        .text-deduction { color: #F59E0B; }
        .bg-deduction { background-color: #F59E0B; }
        .bg-deduction-op { background-color: rgba(245, 158, 11, 0.15); }

        .card-divider { position: relative; }
        .card-divider::before {
            content: ""; position: absolute; top: 0; left: 16px; right: 16px; height: 1px;
            background-color: rgba(255, 255, 255, 0.12); transition: opacity 0.3s ease;
        }
        .hide-divider::before { opacity: 0; }

        /* การเบลอจะเกิดขึ้นเฉพาะตอน "ไม่มีข้อมูลเก่า" เท่านั้น */
        .is-syncing { opacity: 0.7; }

        @keyframes spin-soft {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinning { animation: spin-soft 1s linear infinite; color: #A3E635 !important; }

        .filter-active { 
            border-color: #A3E635 !important; 
            background-color: rgba(163, 230, 53, 0.08) !important; 
            transform: scale(1.02); z-index: 10;
        }
        
        .modal-overlay { transition: opacity 0.3s ease; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 50; display: none; opacity: 0; align-items: flex-end; }
        .modal-content { transition: transform 0.3s ease-out; width: 100%; background: #1c1c1e; border-radius: 32px 32px 0 0; transform: translateY(100%); padding: 24px; border-top: 1px solid rgba(255,255,255,0.1); }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        input, select { background-color: #2c2c2e !important; border: none !important; color: white !important; outline: none !important; }
        .loader { border: 2px solid #000; border-top: 2px solid transparent; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
        .animate-fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .alert-modal-content { width: 85%; margin: auto auto 40px auto; background: #2c2c2e; border-radius: 24px; transform: translateY(100%); padding: 24px; text-align: center; }
        .modal-overlay.active .alert-modal-content { transform: translateY(0); }
    </style>
</head>
<body class="p-5 pb-24 text-white">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8 mt-4 px-1">
        <div onclick="openProfileModal()" class="active:opacity-50 transition-opacity cursor-pointer">
            <p id="greetingText" class="text-gray-500 text-[10px] uppercase tracking-[0.2em] font-semibold text-system">HELLO</p>
            <div class="flex items-center gap-2">
                <h1 id="userNameDisplay" class="text-2xl font-bold tracking-tight">User</h1>
                <i class="fa-solid fa-chevron-right text-gray-600 text-xs mt-1"></i>
            </div>
        </div>
        <button onclick="fetchData()" class="w-10 h-10 bg-[#1c1c1e] rounded-full flex items-center justify-center border border-white/5 active:bg-gray-800 transition-colors">
            <i id="refreshIcon" class="fa-solid fa-rotate-right text-gray-500 text-sm"></i>
        </button>
    </div>

    <!-- Month Navigation -->
    <div class="flex justify-center items-center gap-6 mb-6">
        <button onclick="changeMonth(-1)" class="p-2 text-gray-500 active:text-white"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="relative flex items-center gap-2">
            <span id="displayMonth" class="text-lg font-bold min-w-[130px] text-center">...</span>
            <i class="fa-solid fa-chevron-down text-[10px] text-gray-500"></i>
            <input type="month" id="monthPicker" min="2025-01" onchange="selectMonth(this.value)">
        </div>
        <button onclick="changeMonth(1)" class="p-2 text-gray-500 active:text-white"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <!-- Balance Summary -->
    <div id="balanceCard" class="ios-card shadow-2xl border border-white/5 overflow-hidden">
        <div class="text-center py-8">
            <p class="text-gray-400 text-[10px] tracking-widest mb-2 uppercase font-bold">Available Balance</p>
            <h2 id="totalBalance" class="text-5xl font-black tracking-tighter">฿0</h2>
        </div>
        
        <div class="px-2 pb-2">
            <div id="cardIncome" onclick="setFilter('Income')" class="flex justify-between items-center p-4 rounded-2xl transition-all active:scale-95 cursor-pointer border border-transparent">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-income-op rounded-full flex items-center justify-center text-income"><i class="fa-solid fa-arrow-up text-sm"></i></div>
                    <div class="text-left"><p class="font-bold text-sm">Income</p><p id="countIncome" class="text-[9px] text-gray-500 uppercase font-semibold">0 items</p></div>
                </div>
                <span id="valIncome" class="text-income font-black text-lg tracking-tight">฿0</span>
            </div>

            <div id="cardExpense" onclick="setFilter('Expense')" class="card-divider flex justify-between items-center p-4 rounded-2xl transition-all active:scale-95 cursor-pointer border border-transparent">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-expense-op rounded-full flex items-center justify-center text-expense"><i class="fa-solid fa-arrow-down text-sm"></i></div>
                    <div class="text-left"><p class="font-bold text-sm">Expense</p><p id="countExpense" class="text-[9px] text-gray-500 uppercase font-semibold">0 items</p></div>
                </div>
                <span id="valExpense" class="text-red-500 font-black text-lg tracking-tight">฿0</span>
            </div>

            <div id="cardDeduction" onclick="setFilter('Deduction')" class="card-divider flex justify-between items-center p-4 rounded-2xl transition-all active:scale-95 cursor-pointer border border-transparent">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-deduction-op rounded-full flex items-center justify-center text-deduction"><i class="fa-solid fa-minus text-xs"></i></div>
                    <div class="text-left"><p class="font-bold text-sm">Deduction</p><p id="countDeduction" class="text-[9px] text-gray-500 uppercase font-semibold">0 items</p></div>
                </div>
                <span id="valDeduction" class="text-orange-400 font-black text-lg tracking-tight">฿0</span>
            </div>
        </div>
    </div>

    <!-- ENTRIES Section -->
    <div id="entriesCard" class="ios-card p-5 mt-6">
        <div class="flex justify-between items-center mb-6 px-1">
            <h3 id="entriesTitle" class="font-black tracking-widest text-[10px] text-gray-500 uppercase">Entries</h3>
            <button onclick="openViewAll()" class="text-system text-[10px] font-black uppercase tracking-widest">View All</button>
        </div>
        <div id="entryList" class="space-y-6">
            <div class="text-center py-8 text-gray-500 text-sm italic">Syncing...</div>
        </div>
        <button onclick="openAddEntryModal()" class="w-full mt-10 py-4 bg-system text-black rounded-2xl font-black tracking-widest shadow-xl shadow-lime-500/20 uppercase active:scale-95 transition-transform text-xs">+ Add Entry</button>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 nav-blur border-t border-white/5 px-10 pt-2 pb-5 flex justify-between z-40">
        <div class="text-center text-system">
            <i class="fa-solid fa-house-chimney text-lg"></i>
            <p class="text-[8px] mt-0.5 font-black uppercase tracking-tighter">Home</p>
        </div>
        <div class="text-center text-gray-500 opacity-50">
            <i class="fa-solid fa-chart-pie text-lg"></i>
            <p class="text-[8px] mt-0.5 font-black uppercase tracking-tighter">Summary</p>
        </div>
        <div class="text-center text-gray-500 opacity-50">
            <i class="fa-solid fa-gear text-lg"></i>
            <p class="text-[8px] mt-0.5 font-black uppercase tracking-tighter">SETTINGS</p>
        </div>
    </div>

    <!-- Modals -->
    <div id="profileModal" class="modal-overlay">
        <div class="modal-content pb-10">
            <div class="flex justify-between items-center mb-8 px-1">
                <h3 class="text-xl font-black tracking-tight text-system">Edit Name</h3>
                <button onclick="toggleModal('profileModal', false)" class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center text-gray-400 active:bg-gray-700 transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-6 text-left">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-black ml-1 tracking-widest">User Name</label>
                    <input type="text" id="inputUserName" maxlength="20" placeholder="Enter your name" class="w-full h-14 rounded-2xl px-5 mt-2 font-bold text-xl bg-gray-800 border-none outline-none">
                </div>
                <button onclick="saveProfile()" class="w-full h-14 bg-[#A3E635] text-black rounded-2xl font-extrabold text-lg mt-10 shadow-xl shadow-lime-500/20 uppercase tracking-[0.12em] transition-transform active:scale-[0.98]">SAVE</button>
            </div>
        </div>
    </div>

    <div id="entryModal" class="modal-overlay">
        <div class="modal-content pb-10">
            <div class="flex justify-between items-center mb-8 px-1">
                <h3 class="text-xl font-black tracking-tight text-system">New Entry</h3>
                <button onclick="handleCloseEntryModal()" class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center text-gray-400 active:bg-gray-700 transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-6 text-left">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-black ml-1 tracking-widest">Type</label>
                    <select id="inputType" onchange="markAsDirty(); populateCategories()" class="w-full h-14 rounded-2xl px-5 mt-2 font-bold appearance-none bg-gray-800">
                        <option value="Income">Income</option>
                        <option value="Expense">Expense</option>
                        <option value="Deduction">Deduction</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-black ml-1 tracking-widest">Category</label>
                    <select id="inputCategory" onchange="markAsDirty()" class="w-full h-14 rounded-2xl px-5 mt-2 font-bold appearance-none bg-gray-800"></select>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-black ml-1 tracking-widest">Amount (฿)</label>
                    <input type="number" id="inputAmount" oninput="markAsDirty()" placeholder="0.00" class="w-full h-14 rounded-2xl px-5 mt-2 font-black text-2xl placeholder-gray-400">
                </div>
                <button id="saveBtn" onclick="saveEntry()" class="w-full h-14 bg-[#A3E635] text-black rounded-2xl font-extrabold text-lg mt-10 shadow-xl shadow-lime-500/20 uppercase tracking-[0.12em] transition-transform active:scale-[0.98]">SAVE</button>
            </div>
        </div>
    </div>

    <div id="discardModal" class="modal-overlay" style="align-items: center; background: rgba(0,0,0,0.8);">
        <div class="alert-modal-content">
            <h3 class="text-xl font-bold">Discard changes?</h3>
            <p class="text-gray-400 mt-2 text-sm font-medium">Your changes haven't been saved</p>
            <div class="mt-8 space-y-3">
                <button onclick="toggleModal('discardModal', false)" class="w-full h-14 bg-gray-800 rounded-2xl font-bold text-sm">Keep Editing</button>
                <button onclick="confirmDiscard()" class="w-full h-14 bg-[#EF4444] text-white rounded-2xl font-bold text-sm">Discard</button>
            </div>
        </div>
    </div>

    <div id="viewAllModal" class="modal-overlay">
        <div class="modal-content h-[85vh] flex flex-col">
            <div class="flex justify-between items-center mb-6 px-1">
                <div class="text-left">
                    <h3 id="viewAllTitle" class="text-xl font-black tracking-tight">ALL ENTRIES</h3>
                    <p class="text-[9px] text-gray-500 font-bold tracking-widest mt-0.5 uppercase">Amount (High to Low)</p>
                </div>
                <button onclick="toggleModal('viewAllModal', false)" class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center text-gray-400"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="viewAllList" class="flex-1 overflow-y-auto space-y-6 pb-10 px-1"></div>
        </div>
    </div>

    <script>
        // ************************************************************
        // วาง URL ของคุณตรงนี้
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2RMPvidn8wwyZChTJH18Divz9wrnC1I1Uxhtr08X3e-CQ-PxW2kS8cJR93q-oNL4I1w/exec"; 
        // ************************************************************

        const masterCategories = {
            Income: ["เงินเดือน", "apple music", "ยอดขายทะลุเป้าหมาย", "แชร์", "อื่นๆ"],
            Expense: ["3BB", "แชร์", "แม่", "ศรีสวัสดิ์", "สยามชัย", "AIS", "SEasy", "Spay later", "Tpay later"],
            Deduction: ["มาสาย", "ลืมรูดบัตร", "ออนไลน์ออกก่อนเกิน", "ออนไลน์ออกก่อน", "ไม่สแกนนิ้ว", "ผิดกฎระเบียบ", "ลาป่วย", "ออมทรัพย์"]
        };

        let entries = [];
        let currentViewDate = new Date();
        let currentFilter = null;
        let isModified = false;

        function updateGreeting() {
            const h = new Date().getHours();
            let g = h < 12 ? "GOOD MORNING" : h < 17 ? "GOOD AFTERNOON" : h < 21 ? "GOOD EVENING" : "GOOD NIGHT";
            document.getElementById('greetingText').innerText = g;
        }

        function loadUserProfile() {
            const savedName = localStorage.getItem('userName') || 'Phuwanat';
            document.getElementById('userNameDisplay').innerText = savedName;
            document.getElementById('inputUserName').value = savedName;
        }

        function openProfileModal() { toggleModal('profileModal', true); }
        function saveProfile() {
            const newName = document.getElementById('inputUserName').value.trim();
            if (newName === "") return alert("Please enter a name");
            localStorage.setItem('userName', newName);
            document.getElementById('userNameDisplay').innerText = newName;
            toggleModal('profileModal', false);
        }

        // --- ระบบ FETCH อัจฉริยะ (CACHE FIRST) ---

        async function fetchData() {
            if(SCRIPT_URL === "วาง_URL_ที่นี่") return;
            
            // 1. ลองโหลดจาก LocalStorage ก่อน (Instant Load)
            const cachedData = localStorage.getItem('finance_cache');
            if (cachedData) {
                entries = JSON.parse(cachedData);
                renderData(); // แสดงข้อมูลเก่าทันที
            }

            // 2. แสดงสถานะว่ากำลัง Sync อยู่
            const icon = document.getElementById('refreshIcon');
            const balCard = document.getElementById('balanceCard');
            icon.classList.add('spinning');
            balCard.classList.add('is-syncing');

            try {
                // 3. ไปดึงข้อมูลใหม่จริงๆ จาก Google Sheets
                const response = await fetch(SCRIPT_URL);
                const newData = await response.json();
                
                // 4. ถ้าได้ข้อมูลมา ให้เซฟลง Cache และอัปเดตหน้าจอ
                entries = newData;
                localStorage.setItem('finance_cache', JSON.stringify(newData));
                renderData(); 
            } catch (e) { 
                console.error("Fetch error:", e);
            } finally {
                // 5. ปิดสถานะ Loading
                icon.classList.remove('spinning');
                balCard.classList.remove('is-syncing');
            }
        }

        // --- ระบบ UI & การคำนวณ ---

        function setFilter(type) {
            currentFilter = (currentFilter === type) ? null : type;
            updateCardStyles();
            renderData();
        }

        function updateCardStyles() {
            const types = ['Income', 'Expense', 'Deduction'];
            const hasFilter = currentFilter !== null;
            types.forEach(t => {
                const el = document.getElementById(`card${t}`);
                el.classList.toggle('filter-active', currentFilter === t);
                if (hasFilter) el.classList.add('hide-divider');
                else el.classList.remove('hide-divider');
            });
        }

        function renderData() {
            const list = document.getElementById('entryList');
            const title = document.getElementById('entriesTitle');
            const month = currentViewDate.getMonth();
            const year = currentViewDate.getFullYear();

            const monthData = entries.filter(item => {
                const d = new Date(item.date);
                return d.getMonth() === month && d.getFullYear() === year;
            });

            let totals = { Income: 0, Expense: 0, Deduction: 0, cInc: 0, cExp: 0, cDed: 0 };
            monthData.forEach(item => {
                totals[item.type] += Number(item.amount);
                totals[`c${item.type.slice(0,3)}`]++;
            });

            document.getElementById('totalBalance').innerText = `฿${(totals.Income - totals.Expense).toLocaleString()}`;
            document.getElementById('valIncome').innerText = `฿${totals.Income.toLocaleString()}`;
            document.getElementById('valExpense').innerText = `฿${totals.Expense.toLocaleString()}`;
            document.getElementById('valDeduction').innerText = `฿${totals.Deduction.toLocaleString()}`;
            document.getElementById('countIncome').innerText = `${totals.cInc} items`;
            document.getElementById('countExpense').innerText = `${totals.cExp} items`;
            document.getElementById('countDeduction').innerText = `${totals.cDed} items`;

            let displayData = [...monthData].reverse();
            if (currentFilter) {
                displayData = displayData.filter(item => item.type === currentFilter);
                title.innerText = `${currentFilter.toUpperCase()} ENTRIES`;
            } else {
                title.innerText = `ENTRIES`;
            }

            const homeList = displayData.slice(0, 4);
            list.innerHTML = homeList.length === 0 ? `<p class="text-center text-gray-600 py-8 text-sm italic">No records found</p>` : "";
            homeList.forEach(item => list.innerHTML += createItemHTML(item));
        }

        function createItemHTML(item) {
            const isInc = item.type === 'Income';
            const isExp = item.type === 'Expense';
            const colorClass = isInc ? 'text-income' : isExp ? 'text-expense' : 'text-deduction';
            const bgClass = isInc ? 'bg-income' : isExp ? 'bg-expense' : 'bg-deduction';
            const icon = isInc ? 'fa-arrow-up' : isExp ? 'fa-arrow-down' : 'fa-minus';
            return `
                <div class="flex justify-between items-center animate-fade">
                    <div class="flex items-center gap-4">
                        <div class="w-11 h-11 ${bgClass} rounded-[18px] flex items-center justify-center shadow-lg"><i class="fa-solid ${icon} text-white text-sm"></i></div>
                        <div><p class="text-[15px] font-bold tracking-tight">${item.category}</p><span class="text-[9px] opacity-40 font-black uppercase tracking-widest">${item.type}</span></div>
                    </div>
                    <span class="font-black text-[16px] ${colorClass}">฿${Number(item.amount).toLocaleString()}</span>
                </div>
            `;
        }

        // --- ระบบจัดการข้อมูล ---

        function sortArray(arr) { return arr.sort((a, b) => a.localeCompare(b, 'th', { sensitivity: 'base' })); }
        function populateCategories() {
            const type = document.getElementById('inputType').value;
            const select = document.getElementById('inputCategory');
            select.innerHTML = "";
            sortArray(masterCategories[type]).forEach(cat => { select.innerHTML += `<option value="${cat}">${cat}</option>`; });
        }
        function markAsDirty() { isModified = true; }
        function openAddEntryModal() {
            isModified = false; document.getElementById('inputAmount').value = "";
            const typeSelect = document.getElementById('inputType');
            typeSelect.value = currentFilter || 'Income'; populateCategories();
            toggleModal('entryModal', true);
        }
        function handleCloseEntryModal() {
            if (isModified && document.getElementById('inputAmount').value !== "") { toggleModal('discardModal', true); } 
            else { toggleModal('entryModal', false); }
        }
        function confirmDiscard() { toggleModal('discardModal', false); toggleModal('entryModal', false); isModified = false; }

        async function saveEntry() {
            const type = document.getElementById('inputType').value;
            const category = document.getElementById('inputCategory').value;
            const amount = parseFloat(document.getElementById('inputAmount').value);
            if (!amount || amount <= 0) return alert("Please enter amount");
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerHTML = `<span class="loader"></span>`;
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type, category, amount }) });
                isModified = false; toggleModal('entryModal', false); 
                // เพิ่มข้อมูลเข้า Local แป๊บนึงเพื่อให้เห็นทันที
                entries.push({ date: new Date().toISOString(), type, category, amount });
                renderData();
                setTimeout(fetchData, 1500); // แล้วค่อยดึงตัวจริงมาทับ
            } catch (e) { alert("Failed!"); } finally { btn.disabled = false; btn.innerText = "SAVE"; }
        }

        function openViewAll() {
            const list = document.getElementById('viewAllList');
            const title = document.getElementById('viewAllTitle');
            const month = currentViewDate.getMonth();
            const year = currentViewDate.getFullYear();
            let allData = entries.filter(item => { const d = new Date(item.date); return d.getMonth() === month && d.getFullYear() === year; });
            if (currentFilter) {
                allData = allData.filter(item => item.type === currentFilter);
                title.innerText = `${currentFilter.toUpperCase()} RECORDS`;
            } else { title.innerText = `ALL ENTRIES`; }
            allData.sort((a, b) => Number(b.amount) - Number(a.amount));
            list.innerHTML = ""; allData.forEach(item => list.innerHTML += createItemHTML(item));
            toggleModal('viewAllModal', true);
        }

        function toggleModal(id, show) {
            const el = document.getElementById(id);
            if (show) { el.style.display = 'flex'; setTimeout(() => el.classList.add('active'), 10); }
            else { el.classList.remove('active'); setTimeout(() => el.style.display = 'none', 300); }
        }

        function changeMonth(s) {
            let nextDate = new Date(currentViewDate); nextDate.setMonth(nextDate.getMonth() + s);
            if (nextDate < new Date("2025-01-01")) return;
            currentViewDate = nextDate; updateMonthDisplay(); renderData(); fetchData();
        }

        function selectMonth(v) {
            if(v) {
                let selected = new Date(v + "-01");
                if (selected < new Date("2025-01-01")) return alert("Available from 2025");
                currentViewDate = selected; updateMonthDisplay(); renderData(); fetchData();
            }
        }

        function updateMonthDisplay() { document.getElementById('displayMonth').innerText = currentViewDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }); }

        window.onload = () => {
            updateGreeting();
            updateMonthDisplay();
            populateCategories();
            loadUserProfile();
            fetchData(); // จะโหลด Cache ทันที และ Sync เบื้องหลัง
        };
    </script>
</body>
</html>
