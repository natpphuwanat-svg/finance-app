<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Tracker</title>
    <!-- สำหรับ iPhone Icon -->
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: -apple-system, sans-serif; }
        .ios-card { background-color: #1c1c1e; border-radius: 24px; }
        .nav-blur { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-5 pb-24">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <p class="text-gray-500 text-xs uppercase tracking-widest">Good Morning</p>
            <h1 class="text-2xl font-bold text-white">Phuwanat</h1>
        </div>
        <div class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center relative">
            <i class="fa-regular fa-bell"></i>
            <span class="absolute top-2 right-2 w-2 h-2 bg-green-500 rounded-full border-2 border-black"></span>
        </div>
    </div>

    <!-- Month -->
    <div class="flex justify-center items-center gap-4 mb-6">
        <i class="fa-solid fa-chevron-left text-gray-600"></i>
        <span class="text-lg font-medium">July 2026 <i class="fa-solid fa-chevron-down text-xs ml-1"></i></span>
        <i class="fa-solid fa-chevron-right text-gray-600"></i>
    </div>

    <!-- Balance Card -->
    <div class="ios-card p-8 mb-6 text-center shadow-2xl">
        <p class="text-gray-400 text-xs tracking-widest mb-2">BALANCE</p>
        <h2 class="text-5xl font-semibold mb-8">฿15,480</h2>
        
        <div class="space-y-5">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-500/20 rounded-full flex items-center justify-center text-green-500"><i class="fa-solid fa-arrow-up"></i></div>
                    <div class="text-left"><p class="font-medium">Income</p><p class="text-xs text-gray-500">3 items</p></div>
                </div>
                <span class="text-green-500 font-bold">฿18,800 <i class="fa-solid fa-chevron-right text-[10px] ml-1"></i></span>
            </div>
            <div class="flex justify-between items-center border-t border-gray-800 pt-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-500/20 rounded-full flex items-center justify-center text-red-500"><i class="fa-solid fa-arrow-down"></i></div>
                    <div class="text-left"><p class="font-medium">Expense</p><p class="text-xs text-gray-500">12 items</p></div>
                </div>
                <span class="text-red-500 font-bold">฿3,000 <i class="fa-solid fa-chevron-right text-[10px] ml-1"></i></span>
            </div>
        </div>
    </div>

    <!-- Entries -->
    <div class="ios-card p-5">
        <div class="flex justify-between items-center mb-5">
            <h3 class="font-bold tracking-tight">ENTRIES</h3>
            <button class="text-green-500 text-sm font-medium">View All</button>
        </div>
        <div id="list" class="space-y-6 text-sm">
            <!-- ตัวอย่างรายการ -->
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-600 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-briefcase"></i></div>
                    <div><p class="font-medium">เงินเดือน</p><span class="text-[10px] bg-green-900/50 text-green-400 px-2 py-0.5 rounded-full uppercase">Income</span></div>
                </div>
                <span class="font-bold">฿18,000</span>
            </div>
        </div>
        <button onclick="addData()" class="w-full mt-8 py-2 text-green-500 font-medium">+ Add Entry</button>
    </div>

    <!-- Nav -->
    <div class="fixed bottom-0 left-0 right-0 nav-blur border-t border-gray-800 px-8 py-4 flex justify-between">
        <div class="text-center text-green-500"><i class="fa-solid fa-house-chimney text-xl"></i><p class="text-[10px] mt-1">HOME</p></div>
        <div class="text-center text-gray-500"><i class="fa-solid fa-chart-simple text-xl"></i><p class="text-[10px] mt-1">SUMMARY</p></div>
        <div class="text-center text-gray-500"><i class="fa-solid fa-box-archive text-xl"></i><p class="text-[10px] mt-1">ARCHIVE</p></div>
        <div class="text-center text-gray-500"><i class="fa-solid fa-user text-xl"></i><p class="text-[10px] mt-1">PROFILE</p></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyqz10pEv9EqwO7rHn1DCgAylcpJr3M-ZUEtGfbKYm-TzOvMmMtytLC_JjhkSTBaslF9A/exec";

        async function addData() {
            const amount = prompt("ระบุจำนวนเงิน:");
            if(!amount) return;

            const data = { type: "Income", category: "Extra", amount: amount };
            
            // ส่งข้อมูลไปที่ Google Sheets ผ่าน GAS
            fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(data)
            }).then(() => alert("บันทึกสำเร็จ!"));
        }
    </script>
</body>
</html>
