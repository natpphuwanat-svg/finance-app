<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Finance App Pro</title>
    
    <!-- PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --lime: #bef264; --bg: #090b10; --card: #161b22; }
        * { -webkit-tap-highlight-color: transparent; font-family: 'Outfit', sans-serif; }
        
        body { 
            background-color: var(--bg); color: white; 
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
        }

        /* Glassmorphism & Effects */
        .glass-panel { background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); }
        .btn-active:active { transform: scale(0.96); opacity: 0.8; }
        
        /* Bottom Sheet UI */
        .sheet {
            position: fixed; inset: 0; z-index: 2000;
            visibility: hidden; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sheet.active { visibility: visible; pointer-events: auto; }
        .sheet-content {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: #11151c; border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px 32px 0 0; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 24px 24px calc(30px + env(safe-area-inset-bottom));
        }
        .sheet.active .sheet-content { transform: translateY(0); }
        .sheet-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.4s; }
        .sheet.active .sheet-overlay { opacity: 1; }

        /* Custom Styles */
        .avatar-slot { width: 100%; aspect-ratio: 1/1; border-radius: 24px; border: 2px solid transparent; transition: 0.2s; overflow: hidden; background: var(--card); }
        .avatar-slot.selected { border-color: var(--lime); background: rgba(190, 242, 100, 0.1); }
        
        .nav-bar { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            height: 72px; border-radius: 36px; z-index: 1000;
            display: flex; justify-content: space-around; align-items: center;
        }

        /* Tabular numbers for finance */
        .num { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="px-6 select-none">

    <!-- Header -->
    <header class="flex justify-between items-center py-4 mb-6">
        <div class="flex items-center gap-4 btn-active" onclick="openSheet('profileSheet')">
            <div class="relative">
                <img id="mainImg" src="" class="w-14 h-14 rounded-full object-cover border-2 border-white/10">
                <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-lime-400 rounded-full border-4 border-[#090b10] flex items-center justify-center">
                    <i class="fa-solid fa-plus text-[8px] text-black"></i>
                </div>
            </div>
            <div>
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Good Morning</p>
                <h2 id="userName" class="text-lg font-bold tracking-tight">Loading...</h2>
            </div>
        </div>
        <button class="w-12 h-12 glass-panel rounded-full flex items-center justify-center text-gray-400">
            <i class="fa-regular fa-bell"></i>
        </button>
    </header>

    <!-- Balance Hero -->
    <section class="mb-10">
        <p class="text-xs font-bold text-gray-500 mb-2 uppercase tracking-widest">Available Balance</p>
        <div class="flex items-baseline gap-2">
            <span class="text-2xl font-light text-gray-400">฿</span>
            <h1 id="totalBalance" class="text-5xl font-bold tracking-tighter num">0.00</h1>
        </div>
    </section>

    <!-- Quick Actions -->
    <div class="grid grid-cols-3 gap-4 mb-10">
        <button onclick="openEntry('Income')" class="glass-panel p-6 rounded-[32px] flex flex-col items-center gap-3 btn-active">
            <div class="w-10 h-10 rounded-full bg-lime-400/10 flex items-center justify-center text-lime-400"><i class="fa-solid fa-arrow-up"></i></div>
            <span class="text-[11px] font-bold uppercase tracking-wider">Income</span>
        </button>
        <button onclick="openEntry('Expense')" class="glass-panel p-6 rounded-[32px] flex flex-col items-center gap-3 btn-active">
            <div class="w-10 h-10 rounded-full bg-red-400/10 flex items-center justify-center text-red-400"><i class="fa-solid fa-arrow-down"></i></div>
            <span class="text-[11px] font-bold uppercase tracking-wider">Expense</span>
        </button>
        <button onclick="openEntry('Deduction')" class="glass-panel p-6 rounded-[32px] flex flex-col items-center gap-3 btn-active">
            <div class="w-10 h-10 rounded-full bg-orange-400/10 flex items-center justify-center text-orange-400"><i class="fa-solid fa-minus"></i></div>
            <span class="text-[11px] font-bold uppercase tracking-wider">Deduct</span>
        </button>
    </div>

    <!-- Period Filter -->
    <div class="flex gap-3 mb-8">
        <select id="fMonth" onchange="fetchData()" class="flex-1 glass-panel p-4 rounded-2xl font-bold appearance-none outline-none text-center">
            <option value="0">January</option><option value="1">February</option><option value="2">March</option>
            <option value="3">April</option><option value="4">May</option><option value="5">June</option>
            <option value="6">July</option><option value="7">August</option><option value="8">September</option>
            <option value="9">October</option><option value="10">November</option><option value="11">December</option>
        </select>
        <select id="fYear" onchange="fetchData()" class="w-1/3 glass-panel p-4 rounded-2xl font-bold appearance-none outline-none text-center"></select>
    </div>

    <!-- History -->
    <section>
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold text-xl">Transactions</h3>
            <span id="sync" class="text-[10px] font-bold text-lime-400 uppercase tracking-widest hidden">Syncing...</span>
        </div>
        <div id="hist" class="space-y-3"></div>
    </section>

    <!-- MODAL: Entry Sheet (มาแทน prompt) -->
    <div id="entrySheet" class="sheet">
        <div class="sheet-overlay" onclick="closeSheet('entrySheet')"></div>
        <div class="sheet-content">
            <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-8"></div>
            <h3 id="entryTitle" class="text-xl font-bold mb-6 text-center">New Transaction</h3>
            
            <div class="space-y-4 mb-8">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Category</label>
                    <select id="entryCat" onchange="handleNewCat(this)" class="w-full glass-panel p-5 rounded-2xl font-bold outline-none mt-1 appearance-none"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Amount</label>
                    <input type="number" id="entryAmt" placeholder="0.00" class="w-full glass-panel p-6 rounded-2xl text-4xl font-bold text-center text-lime-400 outline-none mt-1">
                </div>
            </div>
            <button onclick="saveTrans()" id="saveBtn" class="w-full bg-lime-400 text-black py-5 rounded-2xl font-bold text-lg btn-active">Confirm Transaction</button>
        </div>
    </div>

    <!-- MODAL: Profile Sheet -->
    <div id="profileSheet" class="sheet">
        <div class="sheet-overlay" onclick="closeSheet('profileSheet')"></div>
        <div class="sheet-content">
            <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-8"></div>
            <h3 class="text-xl font-bold mb-6">Edit Profile</h3>
            
            <input type="text" id="pName" class="w-full glass-panel p-5 rounded-2xl font-bold mb-8 outline-none border-lime-400/20 focus:border-lime-400" placeholder="Your Name">
            
            <div class="grid grid-cols-3 gap-4 mb-10" id="avGrid"></div>
            
            <button onclick="saveProfile()" class="w-full bg-white text-black py-5 rounded-2xl font-bold btn-active">Save Changes</button>
        </div>
    </div>
    <input type="file" id="fInput" class="hidden" accept="image/*" onchange="handleCustomImg(this)">

    <!-- Bottom Navigation -->
    <nav class="nav-bar glass-panel">
        <button class="text-lime-400 flex flex-col items-center gap-1">
            <i class="fa-solid fa-house-chimney text-lg"></i>
            <span class="text-[8px] font-bold uppercase tracking-wider">Home</span>
        </button>
        <button class="text-gray-500 flex flex-col items-center gap-1">
            <i class="fa-solid fa-chart-line text-lg"></i>
            <span class="text-[8px] font-bold uppercase tracking-wider">Stats</span>
        </button>
        <button class="text-gray-500 flex flex-col items-center gap-1">
            <i class="fa-solid fa-wallet text-lg"></i>
            <span class="text-[8px] font-bold uppercase tracking-wider">Cards</span>
        </button>
        <button onclick="openSheet('profileSheet')" class="text-gray-500 flex flex-col items-center gap-1">
            <i class="fa-solid fa-user-gear text-lg"></i>
            <span class="text-[8px] font-bold uppercase tracking-wider">User</span>
        </button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwRR4D7I2Ck2b09mSgjsfZw1JmpNQDOdB3r518WkslXqSPTYoCOLH20g3LeMlIGvGHW/exec";
        let transactions = [];
        let curAvatar = "";
        let curType = "";
        
        const AVATARS = [
            "https://api.dicebear.com/7.x/notionists/svg?seed=Felix&hair=shortCombover",
            "https://api.dicebear.com/7.x/notionists/svg?seed=Aneka&hair=shortSvenson",
            "https://api.dicebear.com/7.x/notionists/svg?seed=Leo&hair=middleSvenson",
            "https://api.dicebear.com/7.x/notionists/svg?seed=George&hair=shortCombover",
            "https://api.dicebear.com/7.x/notionists/svg?seed=Oliver&hair=shortCombover"
        ];

        // --- Initialization ---
        window.onload = () => {
            setupYears();
            loadProfile();
            const now = new Date();
            document.getElementById('fMonth').value = now.getMonth();
            document.getElementById('fYear').value = now.getFullYear();
            fetchData();
        };

        function setupYears() {
            const sel = document.getElementById('fYear');
            for(let y=2025; y<=2035; y++) {
                const opt = document.createElement('option');
                opt.value = y; opt.text = y;
                sel.add(opt);
            }
        }

        // --- Profile Logic ---
        function loadProfile() {
            const name = localStorage.getItem("u_name") || "Phuwanat";
            const img = localStorage.getItem("u_img") || AVATARS[0];
            document.getElementById('userName').innerText = name;
            document.getElementById('mainImg').src = img;
            document.getElementById('pName').value = name;
            curAvatar = img;
            renderAvatars();
        }

        function renderAvatars() {
            const grid = document.getElementById('avGrid');
            const custom = localStorage.getItem("c_img");
            let html = AVATARS.map(url => `
                <div class="avatar-slot ${curAvatar === url ? 'selected' : ''}" onclick="setAv('${url}')">
                    <img src="${url}">
                </div>`).join('');
            
            html += `
                <div class="avatar-slot flex flex-col items-center justify-center gap-1 ${curAvatar === custom ? 'selected' : ''}" onclick="triggerUpload()">
                    ${custom ? `<img src="${custom}">` : `<i class="fa-solid fa-camera text-gray-500"></i><span class="text-[8px] font-bold text-gray-500 uppercase">Custom</span>`}
                </div>`;
            grid.innerHTML = html;
        }

        function setAv(u) { curAvatar = u; renderAvatars(); }
        function triggerUpload() { document.getElementById('fInput').click(); }
        function handleCustomImg(i) {
            if (i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => {
                    localStorage.setItem("c_img", e.target.result);
                    curAvatar = e.target.result;
                    renderAvatars();
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function saveProfile() {
            localStorage.setItem("u_name", document.getElementById('pName').value);
            localStorage.setItem("u_img", curAvatar);
            loadProfile();
            closeSheet('profileSheet');
        }

        // --- Data Logic ---
        async function fetchData() {
            try {
                document.getElementById('sync').classList.remove('hidden');
                const res = await fetch(API_URL);
                transactions = await res.json();
                renderUI();
            } finally {
                document.getElementById('sync').classList.add('hidden');
            }
        }

        function renderUI() {
            const month = parseInt(document.getElementById('fMonth').value);
            const year = parseInt(document.getElementById('fYear').value);
            let bal = 0;
            let html = "";

            transactions.slice(1).reverse().forEach(row => {
                const [date, type, name, amount] = row;
                const d = new Date(date);
                const amt = parseFloat(amount);

                if (type === 'Income') bal += amt;
                if (type === 'Expense') bal -= amt;

                if (d.getMonth() === month && d.getFullYear() === year) {
                    const color = type==='Income'?'text-lime-400':(type==='Expense'?'text-red-400':'text-orange-400');
                    const sign = type==='Income'?'+':(type==='Expense'?'-':'');
                    html += `
                        <div class="glass-panel p-5 rounded-3xl flex justify-between items-center animate-fadeIn">
                            <div>
                                <p class="font-bold text-sm tracking-tight">${name}</p>
                                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">${d.toLocaleDateString('en-GB')}</p>
                            </div>
                            <p class="font-bold text-lg num ${color}">${sign}${amt.toLocaleString()} ฿</p>
                        </div>`;
                }
            });
            document.getElementById('totalBalance').innerText = bal.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('hist').innerHTML = html || `<div class="py-20 text-center opacity-20 text-sm italic font-medium">No transactions this month</div>`;
        }

        // --- Transaction Sheets ---
        function openEntry(t) {
            curType = t;
            const cats = {
                Income: ["Salary", "Bonus", "Family", "Other"],
                Expense: ["Food", "Rent", "3BB Internet", "AIS", "Car", "Other"],
                Deduction: ["Late for work", "Discipline", "Other"]
            };
            const sel = document.getElementById('entryCat');
            sel.innerHTML = cats[t].map(c => `<option value="${c}">${c}</option>`).join('') + `<option value="NEW">+ New Category...</option>`;
            document.getElementById('entryTitle').innerText = "Add " + t;
            openSheet('entrySheet');
        }

        function handleNewCat(s) {
            if(s.value === 'NEW') {
                const n = prompt("Enter category name:");
                if(n) {
                    const opt = document.createElement('option');
                    opt.value = n; opt.text = n;
                    s.insertBefore(opt, s.firstChild); s.value = n;
                }
            }
        }

        async function saveTrans() {
            const name = document.getElementById('entryCat').value;
            const amount = document.getElementById('entryAmt').value;
            if(!amount) return;
            
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Processing..."; btn.disabled = true;

            try {
                await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({type: curType, name: name, amount: amount}) });
                document.getElementById('entryAmt').value = "";
                closeSheet('entrySheet');
                fetchData();
            } finally {
                btn.innerText = "Confirm Transaction"; btn.disabled = false;
            }
        }

        // --- Sheet Helpers ---
        function openSheet(id) { document.getElementById(id).classList.add('active'); }
        function closeSheet(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
