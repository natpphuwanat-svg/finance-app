<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Finance Dashboard Pro</title>
    
    <!-- ✅ แก้บั๊กไอคอน: ต้องชื่อไฟล์ icon.png ใน GitHub เท่านั้น -->
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finance">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Cropper.js สำหรับครอปรูป -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        :root { --lime: #bef264; --bg: #090b10; --card: #161b22; }
        * { -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background-color: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        body.lock-scroll { overflow: hidden !important; height: 100vh; position: fixed; width: 100%; }

        img { object-fit: cover; object-position: center; }

        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(9, 11, 16, 0.85);
            backdrop-filter: blur(25px);
            padding-top: env(safe-area-inset-top);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .glass { background: rgba(22, 27, 34, 0.75); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.08); }
        .thb { font-size: 0.5em; font-weight: 300; margin-right: 6px; color: rgba(255,255,255,0.4); vertical-align: middle; }

        /* Bottom Sheet UI */
        .sheet { position: fixed; inset: 0; z-index: 2000; visibility: hidden; pointer-events: none; }
        .sheet.active { visibility: visible; pointer-events: auto; }
        .sheet-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); opacity: 0; transition: opacity 0.4s; }
        .sheet.active .sheet-overlay { opacity: 1; }
        .sheet-content {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: #11151c; border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px 32px 0 0; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.3, 1.2, 0.5, 1);
            padding: 12px 24px calc(24px + env(safe-area-inset-bottom));
        }
        .sheet.active .sheet-content { transform: translateY(0); }
        .sheet-handle { width: 40px; height: 5px; background: rgba(255,255,255,0.15); border-radius: 10px; margin: 0 auto 24px; cursor: pointer; }

        /* Grid Item Styles (Months & Avatars) */
        .grid-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .grid-btn { width: 100%; aspect-ratio: 1/1; border-radius: 20px; border: 2.5px solid transparent; background: #1c222b; transition: 0.25s; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #555; font-size: 14px; }
        .grid-btn.selected { border-color: var(--lime); background: rgba(190, 242, 100, 0.1); color: var(--lime); box-shadow: 0 10px 20px rgba(190, 242, 100, 0.15); }

        /* Cropper Modal */
        #cropModal { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; }
        #cropModal.active { display: flex; }
        .crop-area { flex: 1; position: relative; width: 100%; }
        
        .nav-fixed { position: fixed; bottom: 24px; left: 24px; right: 24px; height: 72px; border-radius: 36px; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="pb-40">

    <header class="px-6 pb-4">
        <div class="flex justify-between items-center py-4">
            <div class="flex items-center gap-4" onclick="openSheet('profileSheet')">
                <div class="relative">
                    <img id="headImg" src="" class="w-12 h-12 rounded-2xl shadow-lg bg-[#1c222b]">
                    <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-lime-400 rounded-lg border-[3.5px] border-[#090b10] flex items-center justify-center">
                        <i class="fa-solid fa-pencil text-[7px] text-black"></i>
                    </div>
                </div>
                <div>
                    <p id="greeting" class="text-[9px] font-black text-gray-500 uppercase tracking-[0.2em] leading-none">Greeting</p>
                    <h2 id="headName" class="text-lg font-bold tracking-tight mt-1 leading-none">User</h2>
                </div>
            </div>
            <button class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-regular fa-bell"></i></button>
        </div>
    </header>

    <main class="px-6 mt-6">
        <!-- Month Display: Click to Jump -->
        <div class="flex justify-center items-center gap-10 mb-10 text-gray-600">
            <button onclick="stepDate(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <div id="monthDisplay" onclick="openJumpPicker()" class="text-lg font-bold tracking-tight text-white uppercase tracking-widest cursor-pointer active:opacity-50">JULY 2026</div>
            <button onclick="stepDate(1)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <section class="text-center mb-12">
            <p class="text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em] opacity-80 font-semibold">คงเหลือ BALANCE</p>
            <div class="flex justify-center items-baseline">
                <span class="thb">฿</span>
                <h1 id="mainBal" class="text-5xl font-extrabold tracking-tighter tabular-nums">0.00</h1>
            </div>
        </section>

        <!-- Category Grid -->
        <div class="grid grid-cols-3 gap-3 mb-12">
            <button onclick="prepEntry('Income')" class="glass p-6 rounded-[32px] flex flex-col items-center gap-3">
                <div class="w-11 h-11 rounded-full bg-lime-400/10 flex items-center justify-center text-lime-400"><i class="fa-solid fa-arrow-up"></i></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Income</span>
            </button>
            <button onclick="prepEntry('Expense')" class="glass p-6 rounded-[32px] flex flex-col items-center gap-3">
                <div class="w-11 h-11 rounded-full bg-red-400/10 flex items-center justify-center text-red-500"><i class="fa-solid fa-arrow-down"></i></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Expense</span>
            </button>
            <button onclick="prepEntry('Deduction')" class="glass p-6 rounded-[32px] flex flex-col items-center gap-3">
                <div class="w-11 h-11 rounded-full bg-orange-400/10 flex items-center justify-center text-orange-400"><i class="fa-solid fa-calculator"></i></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500 text-nowrap">Deduct</span>
            </button>
        </div>

        <section>
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-lg tracking-tight">Monthly Activities</h3>
                <span id="sync" class="text-[9px] font-bold text-lime-400 uppercase tracking-widest hidden italic animate-pulse">Syncing...</span>
            </div>
            <div id="hList" class="space-y-3"></div>
        </section>
    </main>

    <!-- SHEET: Quick Jump Period Picker -->
    <div id="jumpSheet" class="sheet">
        <div class="sheet-overlay" onclick="closeSheet('jumpSheet')"></div>
        <div class="sheet-content">
            <div class="sheet-handle" onclick="closeSheet('jumpSheet')"></div>
            
            <div class="flex justify-between items-center mb-8 px-2">
                <button onclick="adjustJumpYear(-1)" class="w-12 h-12 glass rounded-full flex items-center justify-center text-gray-500"><i class="fa-solid fa-chevron-left"></i></button>
                <h3 id="jumpYear" class="text-4xl font-black tracking-tighter">2026</h3>
                <button onclick="adjustJumpYear(1)" class="w-12 h-12 glass rounded-full flex items-center justify-center text-gray-500"><i class="fa-solid fa-chevron-right"></i></button>
            </div>

            <div id="jumpMonthGrid" class="grid-layout mb-8">
                <!-- Month Buttons -->
            </div>
            
            <button onclick="closeSheet('jumpSheet')" class="w-full bg-white/5 py-5 rounded-2xl font-bold text-gray-400">Close</button>
        </div>
    </div>

    <!-- SHEET: Profile Editor -->
    <div id="profileSheet" class="sheet">
        <div class="sheet-overlay" onclick="closeSheet('profileSheet')"></div>
        <div class="sheet-content">
            <div class="sheet-handle" onclick="closeSheet('profileSheet')"></div>
            <h3 class="text-xl font-bold mb-8 text-center tracking-tight uppercase tracking-widest">Personalize</h3>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2 tracking-widest">Profile Name</label>
                    <input type="text" id="pName" class="w-full glass p-5 rounded-2xl font-bold mt-2 outline-none text-xl border-transparent focus:border-lime-400">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2 tracking-widest mb-4 block">Select 2D Style (4M/4F)</label>
                    <div id="avGrid" class="grid-layout"></div>
                </div>
                <button onclick="saveProfile()" class="w-full bg-lime-400 text-black py-5 rounded-2xl font-extrabold text-lg mt-4 shadow-xl active:scale-95 transition-transform">บันทึกข้อมูลส่วนตัว</button>
            </div>
        </div>
    </div>

    <!-- Cropper Overlay -->
    <div id="cropModal">
        <div class="p-6 pt-12 flex justify-between items-center bg-black/50 backdrop-blur">
            <button onclick="closeCrop()" class="text-gray-400 font-bold">Cancel</button>
            <h3 class="font-bold uppercase tracking-widest text-sm">Crop Face</h3>
            <button onclick="finishCrop()" class="text-lime-400 font-bold">Done</button>
        </div>
        <div class="crop-area"><img id="cropImg"></div>
    </div>

    <input type="file" id="fInput" class="hidden" accept="image/*" onchange="onFileSelected(this)">

    <!-- SHEET: Entry Form -->
    <div id="entrySheet" class="sheet">
        <div class="sheet-overlay" onclick="closeSheet('entrySheet')"></div>
        <div class="sheet-content">
            <div class="sheet-handle" onclick="closeSheet('entrySheet')"></div>
            <h3 id="tTitle" class="text-xl font-extrabold mb-8 text-center uppercase tracking-widest">Entry</h3>
            <div class="space-y-5 mb-8">
                <select id="tCat" onchange="checkNewCat(this)" class="w-full glass p-5 rounded-2xl font-bold outline-none appearance-none text-center"></select>
                <div class="relative">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 text-xl font-bold text-lime-400 opacity-40">฿</span>
                    <input type="number" id="tAmt" placeholder="0.00" class="w-full glass p-8 rounded-3xl text-5xl font-black text-center text-lime-400 outline-none">
                </div>
            </div>
            <button onclick="sendTransaction()" id="btnSave" class="w-full bg-white text-black py-5 rounded-2xl font-extrabold text-lg uppercase">Confirm Transaction</button>
        </div>
    </div>

    <nav class="nav-fixed glass flex justify-around items-center px-4">
        <button class="text-lime-400 flex flex-col items-center gap-1"><i class="fa-solid fa-house-chimney text-xl"></i><span class="text-[8px] font-bold uppercase tracking-widest">Home</span></button>
        <button class="text-gray-600 flex flex-col items-center gap-1 opacity-40"><i class="fa-solid fa-chart-line text-xl"></i><span class="text-[8px] font-bold uppercase tracking-widest">Stat</span></button>
        <button class="text-gray-600 flex flex-col items-center gap-1 opacity-40"><i class="fa-solid fa-credit-card text-xl"></i><span class="text-[8px] font-bold uppercase tracking-widest">Card</span></button>
        <button onclick="openSheet('profileSheet')" class="text-gray-500 flex flex-col items-center gap-1"><i class="fa-solid fa-user-gear text-xl"></i><span class="text-[8px] font-bold uppercase tracking-widest">User</span></button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwRR4D7I2Ck2b09mSgjsfZw1JmpNQDOdB3r518WkslXqSPTYoCOLH20g3LeMlIGvGHW/exec";
        let store = [], currentAv = "", mode = "", vDate = new Date();
        let cropper = null;
        let jumpYear = vDate.getFullYear();

        const PRESETS = [
            "https://api.dicebear.com/7.x/notionists/svg?seed=Oliver&backgroundColor=b6e3f4",
            "https://api.dicebear.com/7.x/notionists/svg?seed=Justin&backgroundColor=ffdfbf",
            "https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=d1d4f9",
            "https://api.dicebear.com/7.x/notionists/svg?seed=George&backgroundColor=ffd5dc",
            "https://api.dicebear.com/7.x/notionists/svg?seed=Aneka&backgroundColor=c0aede",
            "https://api.dicebear.com/7.x/notionists/svg?seed=Cali&backgroundColor=ffdfbf",
            "https://api.dicebear.com/7.x/notionists/svg?seed=Jade&backgroundColor=b6e3f4",
            "https://api.dicebear.com/7.x/notionists/svg?seed=Maria&backgroundColor=d1d4f9"
        ];

        window.onload = () => {
            initGreet();
            updateDateUI();
            loadProfile();
            fetchData();
        };

        function initGreet() {
            const h = new Date().getHours();
            let g = "Good Night";
            if(h >= 5 && h < 12) g = "Good Morning";
            else if(h >= 12 && h < 17) g = "Good Afternoon";
            else if(h >= 17 && h < 22) g = "Good Evening";
            document.getElementById('greeting').innerText = g;
        }

        function updateDateUI() {
            const ms = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            document.getElementById('monthDisplay').innerText = `${ms[vDate.getMonth()]} ${vDate.getFullYear()}`;
        }

        function stepDate(s) { vDate.setMonth(vDate.getMonth() + s); updateDateUI(); renderUI(); }

        // --- NEW: QUICK JUMP LOGIC (AUTO-YEAR) ---
        function openJumpPicker() {
            jumpYear = vDate.getFullYear();
            renderJumpGrid();
            openSheet('jumpSheet');
        }

        function adjustJumpYear(s) {
            const realCurrentYear = new Date().getFullYear();
            const minYear = 2025;
            const maxYear = Math.max(2537, realCurrentYear + 1); // ✅ Auto-increases after 2537
            
            const next = jumpYear + s;
            if(next >= minYear && next <= maxYear) {
                jumpYear = next;
                document.getElementById('jumpYear').innerText = jumpYear;
                renderJumpGrid();
            }
        }

        function renderJumpGrid() {
            const grid = document.getElementById('jumpMonthGrid');
            const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            grid.innerHTML = months.map((m, i) => `
                <div class="grid-btn ${vDate.getMonth() === i && vDate.getFullYear() === jumpYear ? 'selected' : ''}" 
                     onclick="applyJump(${i})">${m}</div>
            `).join('');
        }

        function applyJump(idx) {
            vDate.setFullYear(jumpYear);
            vDate.setMonth(idx);
            updateDateUI();
            renderUI();
            closeSheet('jumpSheet');
        }

        // --- PROFILE LOGIC ---
        function loadProfile() {
            const n = localStorage.getItem("uName_") || "Phuwanat";
            const i = localStorage.getItem("uImg_") || PRESETS[0];
            document.getElementById('headName').innerText = n;
            document.getElementById('headImg').src = i;
            document.getElementById('pName').value = n;
            currentAv = i;
            renderAvGrid();
        }

        function renderAvGrid() {
            const g = document.getElementById('avGrid');
            const custom = localStorage.getItem("uCustom_");
            let h = PRESETS.map(u => `<div class="grid-btn ${currentAv === u ? 'selected' : ''}" onclick="pickAv('${u}')"><img src="${u}" class="rounded-xl"></div>`).join('');
            h += `<div class="grid-btn flex flex-col items-center justify-center bg-white/5 ${currentAv === custom ? 'selected' : ''}" onclick="triggerInput()">
                ${custom ? `<img src="${custom}" class="rounded-xl">` : `<i class="fa-solid fa-camera text-2xl opacity-20"></i><span class="text-[7px] font-bold opacity-30 uppercase mt-1">Upload</span>`}
            </div>`;
            grid.innerHTML = h; // Correction from previous typo
            document.getElementById('avGrid').innerHTML = h;
        }

        function pickAv(u) { currentAv = u; renderAvGrid(); }
        function triggerInput() { document.getElementById('fInput').click(); }

        function onFileSelected(input) {
            if(input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = (e) => {
                    const img = document.getElementById('cropImg');
                    img.src = e.target.result;
                    document.getElementById('cropModal').classList.add('active');
                    if(cropper) cropper.destroy();
                    cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1, dragMode: 'move', background: false });
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        function finishCrop() {
            const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
            const base64 = canvas.toDataURL('image/jpeg', 0.8);
            localStorage.setItem("uCustom_", base64);
            currentAv = base64;
            renderAvGrid();
            closeCrop();
        }

        function closeCrop() { document.getElementById('cropModal').classList.remove('active'); document.getElementById('fInput').value = ""; }

        function saveProfile() {
            localStorage.setItem("uName_", document.getElementById('pName').value);
            localStorage.setItem("uImg_", currentAv);
            loadProfile();
            closeSheet('profileSheet');
        }

        // --- DATA LOGIC ---
        async function fetchData() {
            try {
                document.getElementById('sync').classList.remove('hidden');
                const res = await fetch(API_URL);
                store = await res.json();
                renderUI();
            } finally { document.getElementById('sync').classList.add('hidden'); }
        }

        function renderUI() {
            const m = vDate.getMonth(), y = vDate.getFullYear();
            let bal = 0, html = "";
            store.slice(1).reverse().forEach(row => {
                const [date, type, name, amount] = row;
                const d = new Date(date), a = parseFloat(amount);
                if(type === 'Income') bal += a;
                if(type === 'Expense') bal -= a;
                if(d.getMonth() === m && d.getFullYear() === y) {
                    const col = type === 'Income' ? 'text-lime-400' : (type === 'Expense' ? 'text-red-500' : 'text-orange-400');
                    html += `<div class="glass p-5 rounded-[28px] flex justify-between items-center animate-fadeIn">
                        <div><p class="font-bold text-sm tracking-tight">${name}</p><p class="text-[9px] opacity-30 font-bold uppercase tracking-widest">${d.toLocaleDateString('en-GB')}</p></div>
                        <p class="font-bold text-lg ${col} tabular-nums"><span class="thb">฿</span>${a.toLocaleString()}</p>
                    </div>`;
                }
            });
            document.getElementById('mainBal').innerText = bal.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('hList').innerHTML = html || `<div class="py-20 text-center opacity-20 text-sm italic">Empty for this month</div>`;
        }

        function prepEntry(t) {
            mode = t;
            const cats = {
                Income: ["Salary", "Bonus", "Family", "Other"],
                Expense: ["Food", "Transport", "Rent", "3BB Internet", "AIS", "Share", "Spay later", "Tpay later", "SEasy"],
                Deduction: ["Late for work", "Discipline", "Other"]
            };
            const sel = document.getElementById('tCat');
            sel.innerHTML = cats[t].map(c => `<option value="${c}">${c}</option>`).join('') + `<option value="NEW">+ Custom...</option>`;
            document.getElementById('tTitle').innerText = t;
            openSheet('entrySheet');
        }

        function checkNewCat(s) { if(s.value === 'NEW') { const n = prompt("Custom Name:"); if(n) { const o = new Option(n, n); s.insertBefore(o, s.firstChild); s.value = n; } } }

        async function sendTransaction() {
            const n = document.getElementById('tCat').value, a = document.getElementById('tAmt').value;
            if(!a) return;
            const b = document.getElementById('btnSave');
            b.innerText = "Syncing..."; b.disabled = true;
            try {
                await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({type: mode, name: n, amount: a}) });
                document.getElementById('tAmt').value = "";
                closeSheet('entrySheet');
                fetchData();
            } finally { b.innerText = "Confirm Transaction"; b.disabled = false; }
        }

        function openSheet(id) { document.getElementById(id).classList.add('active'); document.body.classList.add('lock-scroll'); }
        function closeSheet(id) { document.getElementById(id).classList.remove('active'); document.body.classList.remove('lock-scroll'); }
    </script>
</body>
</html>
