<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Finance Pro - 9 Avatars</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --lime: #bef264; --bg: #090b10; --card: #161b22; }
        * { -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background-color: var(--bg); color: white; margin: 0; }
        body.lock-scroll { overflow: hidden !important; height: 100vh; position: fixed; width: 100%; }

        /* Sticky Header with Safe Area */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(9, 11, 16, 0.85);
            backdrop-filter: blur(25px);
            padding-top: env(safe-area-inset-top);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .glass { background: rgba(22, 27, 34, 0.75); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.08); }
        
        /* Premium Currency Style */
        .thb { font-size: 0.5em; font-weight: 300; margin-right: 6px; color: rgba(255,255,255,0.4); vertical-align: middle; }

        /* Bottom Sheet */
        .sheet { position: fixed; inset: 0; z-index: 2000; visibility: hidden; pointer-events: none; }
        .sheet.active { visibility: visible; pointer-events: auto; }
        .sheet-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); opacity: 0; transition: opacity 0.4s; }
        .sheet.active .sheet-overlay { opacity: 1; }
        .sheet-content {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: #11151c; border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px 32px 0 0; transform: translateY(100%);
            transition: transform 0.45s cubic-bezier(0.3, 1.2, 0.5, 1);
            padding: 12px 24px calc(30px + env(safe-area-inset-bottom));
        }
        .sheet.active .sheet-content { transform: translateY(0); }
        .sheet-handle { width: 40px; height: 5px; background: rgba(255,255,255,0.15); border-radius: 10px; margin: 0 auto 24px; cursor: pointer; }

        /* 3x3 Avatar Grid */
        .av-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .av-item { width: 100%; aspect-ratio: 1/1; border-radius: 20px; border: 2.5px solid transparent; overflow: hidden; background: #1c222b; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .av-item.selected { border-color: var(--lime); transform: scale(1.05); box-shadow: 0 10px 25px rgba(190, 242, 100, 0.2); }
        .av-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .nav-fixed { position: fixed; bottom: 24px; left: 24px; right: 24px; height: 72px; border-radius: 36px; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    </style>
</head>
<body class="pb-40">

    <!-- Header -->
    <header class="px-6 pb-4">
        <div class="flex justify-between items-center py-4">
            <div class="flex items-center gap-4" onclick="openSheet('profileSheet')">
                <div class="relative">
                    <img id="headImg" src="" class="w-12 h-12 rounded-2xl object-cover ring-2 ring-white/10 shadow-lg">
                    <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-lime-400 rounded-lg border-[3.5px] border-[#090b10] flex items-center justify-center">
                        <i class="fa-solid fa-pencil text-[7px] text-black"></i>
                    </div>
                </div>
                <div>
                    <p id="greeting" class="text-[9px] font-black text-gray-500 uppercase tracking-[0.2em] leading-none">Greeting</p>
                    <h2 id="headName" class="text-lg font-bold tracking-tight mt-1 leading-none">User</h2>
                </div>
            </div>
            <button class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-500"><i class="fa-regular fa-bell"></i></button>
        </div>
    </header>

    <main class="px-6 mt-6">
        <!-- Month Nav -->
        <div class="flex justify-center items-center gap-10 mb-10">
            <button onclick="changeDate(-1)" class="text-gray-600"><i class="fa-solid fa-chevron-left text-sm"></i></button>
            <div id="monthDisplay" class="text-lg font-bold tracking-tight">Month Year</div>
            <button onclick="changeDate(1)" class="text-gray-600"><i class="fa-solid fa-chevron-right text-sm"></i></button>
        </div>

        <!-- Balance -->
        <section class="text-center mb-12">
            <p class="text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em] opacity-80">คงเหลือ BALANCE</p>
            <div class="flex justify-center items-baseline">
                <span class="thb">฿</span>
                <h1 id="mainBal" class="text-5xl font-extrabold tracking-tighter tabular-nums">0.00</h1>
            </div>
        </section>

        <!-- Categories -->
        <div class="grid grid-cols-3 gap-3 mb-12">
            <button onclick="prepTrans('Income')" class="glass p-6 rounded-[32px] flex flex-col items-center gap-3">
                <div class="w-11 h-11 rounded-full bg-lime-400/10 flex items-center justify-center text-lime-400"><i class="fa-solid fa-arrow-up"></i></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Income</span>
            </button>
            <button onclick="prepTrans('Expense')" class="glass p-6 rounded-[32px] flex flex-col items-center gap-3">
                <div class="w-11 h-11 rounded-full bg-red-500/10 flex items-center justify-center text-red-500"><i class="fa-solid fa-arrow-down"></i></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Expense</span>
            </button>
            <button onclick="prepTrans('Deduction')" class="glass p-6 rounded-[32px] flex flex-col items-center gap-3">
                <div class="w-11 h-11 rounded-full bg-orange-500/10 flex items-center justify-center text-orange-500"><i class="fa-solid fa-calculator"></i></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Deduct</span>
            </button>
        </div>

        <!-- Activities -->
        <section>
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-lg tracking-tight">Recent Records</h3>
                <span id="sync" class="text-[9px] font-bold text-lime-400 uppercase tracking-widest hidden">Syncing...</span>
            </div>
            <div id="hList" class="space-y-3"></div>
        </section>
    </main>

    <!-- SHEET: Profile (9 Slots Grid) -->
    <div id="profileSheet" class="sheet">
        <div class="sheet-overlay" onclick="closeSheet('profileSheet')"></div>
        <div class="sheet-content">
            <div class="sheet-handle" onclick="closeSheet('profileSheet')"></div>
            <h3 class="text-xl font-bold mb-8 text-center tracking-tight">Personalize Profile</h3>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2 tracking-widest">Username</label>
                    <input type="text" id="pName" class="w-full glass p-5 rounded-2xl font-bold mt-2 outline-none border-transparent focus:border-lime-400 text-xl transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2 tracking-widest mb-4 block">Select 2D Avatar</label>
                    <div id="avGrid" class="av-grid"></div>
                </div>
                <button onclick="saveProfile()" class="w-full bg-lime-400 text-black py-5 rounded-2xl font-extrabold text-lg mt-4 shadow-xl shadow-lime-900/10 active:scale-95 transition-transform">บันทึกข้อมูลส่วนตัว</button>
            </div>
        </div>
    </div>
    <input type="file" id="fUpload" class="hidden" accept="image/*" onchange="onFile(this)">

    <!-- SHEET: Transaction -->
    <div id="entrySheet" class="sheet">
        <div class="sheet-overlay" onclick="closeSheet('entrySheet')"></div>
        <div class="sheet-content">
            <div class="sheet-handle" onclick="closeSheet('entrySheet')"></div>
            <h3 id="tTitle" class="text-xl font-extrabold mb-8 text-center uppercase tracking-widest">Entry</h3>
            <div class="space-y-5 mb-8">
                <select id="tCat" onchange="checkNew(this)" class="w-full glass p-5 rounded-2xl font-bold outline-none appearance-none text-center"></select>
                <div class="relative">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 text-xl font-bold text-lime-400 opacity-40">฿</span>
                    <input type="number" id="tAmt" placeholder="0.00" class="w-full glass p-8 rounded-3xl text-5xl font-black text-center text-lime-400 outline-none">
                </div>
            </div>
            <button onclick="sendEntry()" id="bSave" class="w-full bg-white text-black py-5 rounded-2xl font-extrabold text-lg uppercase">Confirm Entry</button>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="nav-fixed glass flex justify-around items-center px-4">
        <button class="text-lime-400 flex flex-col items-center gap-1"><i class="fa-solid fa-house-chimney text-xl"></i><span class="text-[8px] font-bold uppercase tracking-widest">Home</span></button>
        <button class="text-gray-600 flex flex-col items-center gap-1 opacity-40"><i class="fa-solid fa-chart-line text-xl"></i><span class="text-[8px] font-bold uppercase tracking-widest text-nowrap">Stat</span></button>
        <button class="text-gray-600 flex flex-col items-center gap-1 opacity-40"><i class="fa-solid fa-credit-card text-xl"></i><span class="text-[8px] font-bold uppercase tracking-widest text-nowrap">Card</span></button>
        <button onclick="openSheet('profileSheet')" class="text-gray-500 flex flex-col items-center gap-1"><i class="fa-solid fa-user-gear text-xl"></i><span class="text-[8px] font-bold uppercase tracking-widest text-nowrap">User</span></button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwRR4D7I2Ck2b09mSgjsfZw1JmpNQDOdB3r518WkslXqSPTYoCOLH20g3LeMlIGvGHW/exec";
        let store = [], curAv = "", mode = "", vDate = new Date();

        // 8 Modern Presets (4 Male, 4 Female) + 1 Slot for Upload
        const PRESETS = [
            "https://api.dicebear.com/7.x/notionists/svg?seed=Oliver&backgroundColor=b6e3f4", // M1
            "https://api.dicebear.com/7.x/notionists/svg?seed=Justin&backgroundColor=ffdfbf", // M2
            "https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=d1d4f9",  // M3
            "https://api.dicebear.com/7.x/notionists/svg?seed=George&backgroundColor=ffd5dc", // M4
            "https://api.dicebear.com/7.x/notionists/svg?seed=Aneka&backgroundColor=c0aede",  // F1
            "https://api.dicebear.com/7.x/notionists/svg?seed=Cali&backgroundColor=ffdfbf",   // F2
            "https://api.dicebear.com/7.x/notionists/svg?seed=Jade&backgroundColor=b6e3f4",   // F3
            "https://api.dicebear.com/7.x/notionists/svg?seed=Maria&backgroundColor=d1d4f9"   // F4
        ];

        window.onload = () => {
            initGreet();
            updateDate();
            loadProfile();
            fetchData();
        };

        function initGreet() {
            const h = new Date().getHours();
            let g = "Good Night";
            if(h >= 5 && h < 12) g = "Good Morning";
            else if(h >= 12 && h < 17) g = "Good Afternoon";
            else if(h >= 17 && h < 22) g = "Good Evening";
            document.getElementById('greeting').innerText = g;
        }

        function updateDate() {
            const ms = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            document.getElementById('monthDisplay').innerText = `${ms[vDate.getMonth()]} ${vDate.getFullYear()}`;
        }

        function changeDate(s) { vDate.setMonth(vDate.getMonth() + s); updateDate(); renderUI(); }

        // --- PROFILE ---
        function loadProfile() {
            const n = localStorage.getItem("n_") || "Phuwanat";
            const i = localStorage.getItem("i_") || PRESETS[0];
            document.getElementById('headName').innerText = n;
            document.getElementById('headImg').src = i;
            document.getElementById('pName').value = n;
            curAv = i;
            renderAvGrid();
        }

        function renderAvGrid() {
            const g = document.getElementById('avGrid');
            const custom = localStorage.getItem("c_");
            let h = PRESETS.map(u => `<div class="av-item ${curAv === u ? 'selected' : ''}" onclick="pickAv('${u}')"><img src="${u}"></div>`).join('');
            h += `<div class="av-item flex flex-col items-center justify-center bg-white/5 ${curAv === custom ? 'selected' : ''}" onclick="triggerUp()">
                ${custom ? `<img src="${custom}">` : `<i class="fa-solid fa-camera text-2xl opacity-20"></i><span class="text-[7px] font-bold opacity-30 uppercase mt-1">Upload</span>`}
            </div>`;
            g.innerHTML = h;
        }

        function pickAv(u) { curAv = u; renderAvGrid(); }
        function triggerUp() { document.getElementById('fUpload').click(); }
        function onFile(input) {
            if(input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { localStorage.setItem("c_", e.target.result); curAv = e.target.result; renderAvGrid(); };
                r.readAsDataURL(input.files[0]);
            }
        }

        function saveProfile() {
            localStorage.setItem("n_", document.getElementById('pName').value);
            localStorage.setItem("i_", curAv);
            loadProfile();
            closeSheet('profileSheet');
        }

        // --- DATA ---
        async function fetchData() {
            try {
                document.getElementById('sync').classList.remove('hidden');
                const res = await fetch(API_URL);
                store = await res.json();
                renderUI();
            } finally { document.getElementById('sync').classList.add('hidden'); }
        }

        function renderUI() {
            const m = vDate.getMonth(), y = vDate.getFullYear();
            let bal = 0, html = "";
            store.slice(1).reverse().forEach(row => {
                const [date, type, name, amount] = row;
                const d = new Date(date), a = parseFloat(amount);
                if(type === 'Income') bal += a;
                if(type === 'Expense') bal -= a;
                if(d.getMonth() === m && d.getFullYear() === y) {
                    const col = type === 'Income' ? 'text-lime-400' : (type === 'Expense' ? 'text-red-500' : 'text-orange-400');
                    html += `<div class="glass p-5 rounded-[28px] flex justify-between items-center animate-fadeIn">
                        <div><p class="font-bold text-sm tracking-tight">${name}</p><p class="text-[9px] opacity-30 font-bold uppercase tracking-widest">${d.toLocaleDateString('en-GB')}</p></div>
                        <p class="font-bold text-lg ${col} tabular-nums"><span class="thb">฿</span>${a.toLocaleString()}</p>
                    </div>`;
                }
            });
            document.getElementById('mainBal').innerText = bal.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('hList').innerHTML = html || `<div class="py-20 text-center opacity-20 text-sm italic">No activities recorded.</div>`;
        }

        function prepTrans(t) {
            mode = t;
            const cats = {
                Income: ["Salary", "Bonus", "Family", "Other"],
                Expense: ["Food", "Transport", "Rent", "3BB Internet", "AIS", "Share", "Spay later", "Tpay later", "SEasy"],
                Deduction: ["Late for work", "Discipline", "Other"]
            };
            const sel = document.getElementById('tCat');
            sel.innerHTML = cats[t].map(c => `<option value="${c}">${c}</option>`).join('') + `<option value="NEW">+ Custom...</option>`;
            document.getElementById('tTitle').innerText = t;
            openSheet('entrySheet');
        }

        function checkNew(s) { if(s.value === 'NEW') { const n = prompt("Custom Name:"); if(n) { const o = new Option(n, n); s.insertBefore(o, s.firstChild); s.value = n; } } }

        async function sendEntry() {
            const n = document.getElementById('tCat').value, a = document.getElementById('tAmt').value;
            if(!a) return;
            const b = document.getElementById('bSave');
            b.innerText = "Syncing..."; b.disabled = true;
            try {
                await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({type: mode, name: n, amount: a}) });
                document.getElementById('tAmt').value = "";
                closeSheet('entrySheet');
                fetchData();
            } finally { b.innerText = "Confirm Entry"; b.disabled = false; }
        }

        function openSheet(id) { document.getElementById(id).classList.add('active'); document.body.classList.add('lock-scroll'); }
        function closeSheet(id) { document.getElementById(id).classList.remove('active'); document.body.classList.remove('lock-scroll'); }
    </script>
</body>
</html>
